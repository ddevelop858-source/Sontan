<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sontan System Legacy Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #05070a; }
        * { box-sizing: border-box; transition: 0.3s; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow: hidden; height: 100dvh; }

        /* ОНЛАЙН СТАТУС */
        #status { position: fixed; top: 20px; left: 20px; z-index: 999; font-size: 12px; color: var(--neon); background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 15px; border: 1px solid var(--neon); }
        
        /* РАДИО И МОЛНИЯ */
        .radio-box { position: fixed; top: 20px; right: 20px; z-index: 999; display: flex; flex-direction: column; align-items: center; }
        .radio-btn { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--neon); background: #000; color: var(--neon); display: flex; align-items: center; justify-content: center; font-size: 9px; cursor: pointer; text-align: center; font-weight: bold; }
        .bolt { width: 30px; height: 40px; fill: var(--neon); opacity: 0.2; filter: drop-shadow(0 0 5px var(--neon)); }
        .spinning { animation: rotate 4s linear infinite; background: var(--neon) !important; color: #000 !important; }
        .active-bolt { opacity: 1; animation: flash 1.5s infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes flash { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* ЭКРАН ВХОДА */
        #auth { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .v-ring { width: 280px; height: 280px; border-radius: 50%; border: 2px solid var(--neon); overflow: hidden; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; inset: 0; }

        /* ЧАТ */
        #chat { display: none; height: 100dvh; flex-direction: column; }
        #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 140px; }
        .m-box { background: #161b22; padding: 12px; border-radius: 15px; border-left: 3px solid var(--neon); max-width: 85%; align-self: flex-start; }
        .m-box b { color: var(--neon); font-size: 10px; display: block; margin-bottom: 5px; }
        .m-box img, .m-box video { max-width: 100%; border-radius: 10px; margin-top: 8px; }

        /* ВВОД С ПРЕДПРОСМОТРОМ */
        .bar { position: fixed; bottom: 0; width: 100%; background: rgba(5,7,10,0.95); border-top: 1px solid #222; z-index: 999; }
        #preview { display: none; padding: 10px; background: #111; border-bottom: 1px solid #333; align-items: center; gap: 10px; }
        #preview img, #preview video { height: 50px; border-radius: 5px; border: 1px solid var(--neon); }
        .row { display: flex; padding: 15px; gap: 10px; align-items: center; }
        input { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 20px; }
        .btn { width: 45px; height: 45px; border-radius: 50%; background: var(--neon); border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="status">В СЕТИ: <span id="online">0</span></div>

    <div class="radio-box">
        <div class="radio-btn" id="radBtn" onclick="toggleRad()">EUROPA<br>PLUS</div>
        <svg class="bolt" id="bolt" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
    </div>

    <div id="auth">
        <h1 style="color:var(--neon); letter-spacing:3px;">SONTAN SYSTEM</h1>
        <div class="v-ring">
            <video id="webcam" autoplay muted playsinline></video>
            <canvas id="cv"></canvas>
        </div>
        <button onclick="startAuth()" style="margin-top:30px; padding:15px 50px; border-radius:30px; background:var(--neon); border:none; font-weight:bold;">ВОЙТИ</button>
    </div>

    <div id="chat">
        <div id="msgs"></div>
        <div class="bar">
            <div id="preview">
                <div id="thumb"></div>
                <span style="font-size:10px; color:var(--neon)">Файл готов</span>
                <button onclick="clearFile()" style="margin-left:auto; background:none; border:none; color:red">✕</button>
            </div>
            <div class="row">
                <button class="btn" onclick="document.getElementById('fIn').click()">+</button>
                <input type="file" id="fIn" hidden accept="image/*,video/*" onchange="showPreview(this)">
                <input type="text" id="mIn" placeholder="Сообщение...">
                <button class="btn" onclick="send()">➤</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://gwegmxznhlmzejqdpykv.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3ZWdteHpuaGxtemVqcWRweWt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NTYwNjUsImV4cCI6MjA5MTAzMjA2NX0.LZM1GRtqylBxX-d_eze3OmfHsnfRQI4kROZpr_OIWx0';
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);
        
        let user = "Гость";
        let audio = new Audio('https://ep256.hostingradio.ru:8052/europaplus256.mp3');
        let fileObj = null;

        function toggleRad() {
            const b = document.getElementById('radBtn');
            const l = document.getElementById('bolt');
            if (audio.paused) { audio.play(); b.classList.add('spinning'); l.classList.add('active-bolt'); }
            else { audio.pause(); b.classList.remove('spinning'); l.classList.remove('active-bolt'); }
        }

        async function startAuth() {
            const MODEL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
            await Promise.all([faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL), faceapi.nets.faceLandmark68Net.loadFromUri(MODEL), faceapi.nets.faceRecognitionNet.loadFromUri(MODEL)]);
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('webcam').srcObject = stream;
            const { data: db } = await supabase.from('allowed_faces').select('*');
            const v = document.getElementById('webcam');
            const c = document.getElementById('cv');
            faceapi.matchDimensions(c, { width: 280, height: 280 });

            const loop = setInterval(async () => {
                const dec = await faceapi.detectAllFaces(v).withFaceLandmarks().withFaceDescriptors();
                if (dec.length > 0) {
                    faceapi.draw.drawFaceLandmarks(c, faceapi.resizeResults(dec, { width: 280, height: 280 }));
                    dec.forEach(d => {
                        db?.forEach(u => {
                            if (faceapi.euclideanDistance(d.descriptor, new Float32Array(u.face_descriptor)) < 0.45) {
                                user = u.name; clearInterval(loop); openChat();
                            }
                        });
                    });
                }
            }, 600);
        }

        function openChat() {
            document.getElementById('auth').style.display = 'none';
            document.getElementById('chat').style.display = 'flex';
            const chan = supabase.channel('online').on('presence', {event:'sync'}, () => {
                document.getElementById('online').innerText = Object.keys(chan.presenceState()).length;
            }).subscribe(async (s) => { if(s==='SUBSCRIBED') await chan.track({user}); });
            load();
            supabase.channel('db').on('postgres_changes', {event:'*', schema:'public', table:'messages'}, load).subscribe();
        }

        async function load() {
            const { data } = await supabase.from('messages').select('*').order('created_at', { ascending: true });
            const box = document.getElementById('msgs');
            box.innerHTML = '';
            data?.forEach(m => {
                const d = document.createElement('div');
                d.className = 'm-box';
                let content = `<b>${m.sender_name}</b>`;
                if(m.media_url) content += m.media_url.includes('mp4') ? `<video src="${m.media_url}" controls playsinline></video>` : `<img src="${m.media_url}">`;
                if(m.content) content += `<div>${m.content}</div>`;
                d.innerHTML = content;
                d.onclick = () => { if(confirm("Удалить?")) supabase.from('messages').delete().eq('id', m.id); };
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        }

        function showPreview(el) {
            fileObj = el.files[0];
            if (!fileObj) return;
            document.getElementById('preview').style.display = 'flex';
            document.getElementById('thumb').innerHTML = fileObj.type.includes('video') ? `<video src="${URL.createObjectURL(fileObj)}" muted></video>` : `<img src="${URL.createObjectURL(fileObj)}">`;
        }

        function clearFile() {
            fileObj = null;
            document.getElementById('fIn').value = '';
            document.getElementById('preview').style.display = 'none';
        }

        async function send() {
            const input = document.getElementById('mIn');
            const txt = input.value;
            let url = null;

            if (fileObj) {
                const path = Date.now() + "_" + fileObj.name;
                const { data } = await supabase.storage.from('uploads').upload(path, fileObj);
                if (data) url = supabase.storage.from('uploads').getPublicUrl(path).data.publicUrl;
                clearFile();
            }

            if (txt || url) {
                await supabase.from('messages').insert([{ sender_name: user, content: txt, media_url: url }]);
                input.value = '';
            }
        }
    </script>
</body>
</html>
