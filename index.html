<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sontan System Legacy Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #05070a; }
        * { transition: all 0.3s ease; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: 'Courier New', Courier, monospace; margin: 0; overflow: hidden; height: 100dvh; }

        /* ЭКРАН ВХОДА */
        #auth-screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); z-index: 9999; }
        .logo-container { position: relative; margin-bottom: 40px; }
        .logo-text { font-size: 28px; font-weight: bold; color: var(--neon); letter-spacing: 3px; cursor: pointer; }
        
        /* МОЛНИЯ */
        .lightning { position: absolute; top: -10px; right: -20px; width: 40px; height: 40px; filter: drop-shadow(0 0 5px var(--neon)); }

        .scan-circle { width: 260px; height: 260px; border-radius: 50%; border: 2px solid var(--neon); overflow: hidden; position: relative; box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); }
        video#cam { width: 100%; height: 100%; object-fit: cover; }

        /* РАДИО */
        .radio-box { position: fixed; top: 20px; right: 20px; z-index: 10001; cursor: pointer; }
        .radio-circle { 
            width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--neon); 
            background: rgba(0,0,0,0.8); color: var(--neon); display: flex; align-items: center; 
            justify-content: center; font-size: 10px; font-weight: bold; text-align: center;
        }
        .spinning { animation: rotate 4s linear infinite; box-shadow: 0 0 15px var(--neon); background: var(--neon) !important; color: black !important; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ЧАТ (КАК РАНЬШЕ) */
        #chat-ui { display: none; height: 100dvh; flex-direction: column; }
        #messages { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; 
            margin-top: 80px; padding-bottom: 120px; scroll-behavior: smooth;
        }
        .msg-row { border-left: 2px solid var(--neon); padding-left: 15px; margin-bottom: 5px; }
        .msg-row b { color: var(--neon); font-size: 12px; display: block; margin-bottom: 5px; text-transform: uppercase; }
        .msg-text { font-size: 16px; color: #fff; line-height: 1.4; word-break: break-all; }
        .msg-img { max-width: 90%; border-radius: 8px; margin-top: 10px; border: 1px solid #333; }

        /* ПАНЕЛЬ ВВОДА */
        .input-bar { position: fixed; bottom: 0; width: 100%; padding: 20px; background: rgba(5,7,10,0.95); display: flex; gap: 15px; z-index: 1000; border-top: 1px solid #1a1a1a; }
        .input-field { flex: 1; background: transparent; border: 1px solid var(--neon); color: white; padding: 12px 20px; border-radius: 30px; outline: none; }
        .send-btn { background: var(--neon); color: black; border: none; width: 50px; height: 50px; border-radius: 50%; font-weight: bold; cursor: pointer; }

        #status { margin-top: 25px; color: var(--neon); font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="radio-box" onclick="toggleRadio()">
        <div class="radio-circle" id="radBtn">RAD<br>IO</div>
    </div>

    <div id="auth-screen">
        <div class="logo-container">
            <div class="logo-text" onclick="adm()">SONTAN SYSTEM</div>
            <svg class="lightning" viewBox="0 0 24 24" fill="none" stroke="#00f2ff" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        </div>
        <div class="scan-circle"><video id="cam" autoplay muted playsinline></video></div>
        <div id="status">Инициализация Face ID...</div>
        <button id="reg" style="display:none; margin-top:20px; background:#ff00ff;" class="send-btn" onclick="regFace()">+</button>
    </div>

    <div id="chat-ui">
        <div id="messages"></div>
        <div class="input-bar">
            <button class="send-btn" onclick="document.getElementById('fileIn').click()">+</button>
            <input type="file" id="fileIn" hidden onchange="upload(this)">
            <input type="text" id="msgIn" class="input-field" placeholder="Введите сообщение...">
            <button class="send-btn" onclick="send()">➤</button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://gwegmxznhlmzejqdpykv.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3ZWdteHpuaGxtemVqcWRweWt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NTYwNjUsImV4cCI6MjA5MTAzMjA2NX0.LZM1GRtqylBxX-d_eze3OmfHsnfRQI4kROZpr_OIWx0';
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        let myName = "Sergey";
        let cCount = 0;
        let audio = new Audio('https://ep256.hostingradio.ru:8052/europaplus256.mp3');

        async function init() {
            const models = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
            await Promise.all([
                faceapi.nets.ssdMobilenetv1.loadFromUri(models),
                faceapi.nets.faceLandmark68Net.loadFromUri(models),
                faceapi.nets.faceRecognitionNet.loadFromUri(models)
            ]);

            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('cam').srcObject = stream;
            
            const { data: list } = await supabase.from('allowed_faces').select('*');
            
            const scan = setInterval(async () => {
                const detect = await faceapi.detectSingleFace(document.getElementById('cam')).withFaceLandmarks().withFaceDescriptor();
                if(detect && list) {
                    list.forEach(u => {
                        const dist = faceapi.euclideanDistance(detect.descriptor, new Float32Array(u.face_descriptor));
                        if(dist < 0.5) {
                            myName = u.name;
                            clearInterval(scan);
                            enterChat();
                        }
                    });
                }
            }, 1000);
        }

        function enterChat() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'flex';
            load();
            supabase.channel('room').on('postgres_changes', {event:'*', schema:'public', table:'messages'}, load).subscribe();
        }

        async function load() {
            const { data } = await supabase.from('messages').select('*').order('created_at', { ascending: true });
            const box = document.getElementById('messages');
            box.innerHTML = '';
            data?.forEach(m => {
                const d = document.createElement('div');
                d.className = 'msg-row';
                let html = `<b>${m.sender_name}</b>`;
                if(m.media_url) html += `<img src="${m.media_url}" class="msg-img">`;
                if(m.content) html += `<div class="msg-text">${m.content}</div>`;
                d.innerHTML = html;
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        }

        async function send() {
            const i = document.getElementById('msgIn');
            if(!i.value) return;
            await supabase.from('messages').insert([{ sender_name: myName, content: i.value }]);
            i.value = '';
        }

        async function upload(el) {
            const f = el.files[0];
            const name = Date.now() + "_" + f.name;
            const { data } = await supabase.storage.from('uploads').upload(name, f);
            if(data) {
                const { data: res } = supabase.storage.from('uploads').getPublicUrl(name);
                await supabase.from('messages').insert([{ sender_name: myName, media_url: res.publicUrl, content: "" }]);
            }
        }

        function toggleRadio() {
            const b = document.getElementById('radBtn');
            if (audio.paused) { audio.play(); b.classList.add('spinning'); }
            else { audio.pause(); b.classList.remove('spinning'); }
        }

        function adm() {
            cCount++;
            if(cCount >= 5) {
                if(prompt("Code:") === "Seregasib") document.getElementById('reg').style.display = 'block';
                cCount = 0;
            }
        }

        async function regFace() {
            const n = prompt("Имя:");
            const d = await faceapi.detectSingleFace(document.getElementById('cam')).withFaceLandmarks().withFaceDescriptor();
            if(d && n) {
                await supabase.from('allowed_faces').insert([{ name: n, face_descriptor: Array.from(d.descriptor) }]);
                alert("Готово!");
            }
        }

        window.onload = init;
    </script>
</body>
</html>
