<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sontan System Final Ultimate</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #05070a; }
        * { box-sizing: border-box; transition: 0.3s; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow: hidden; height: 100dvh; }

        /* ИНДИКАТОР В СЕТИ */
        #status { position: fixed; top: 20px; left: 20px; z-index: 9999; font-size: 13px; color: var(--neon); background: rgba(0,0,0,0.7); padding: 7px 15px; border-radius: 20px; border: 1px solid var(--neon); box-shadow: 0 0 10px var(--neon); display: none; }
        .dot { display: inline-block; width: 8px; height: 8px; background: #0f0; border-radius: 50%; margin-right: 7px; box-shadow: 0 0 5px #0f0; }

        /* РАДИО И МОЛНИЯ (ПОВЕРХ ВСЕГО) */
        .radio-zone { position: fixed; top: 20px; right: 20px; z-index: 10000; display: flex; flex-direction: column; align-items: center; }
        .radio-btn { width: 70px; height: 70px; border-radius: 50%; border: 3px solid var(--neon); background: #000; color: var(--neon); display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; text-align: center; font-weight: bold; box-shadow: 0 0 15px rgba(0,242,255,0.4); }
        .bolt-svg { width: 40px; height: 50px; fill: var(--neon); opacity: 0.1; filter: drop-shadow(0 0 10px var(--neon)); margin-top: -5px; }
        .spinning { animation: rotate 4s linear infinite; background: var(--neon) !important; color: #000 !important; }
        .bolt-active { opacity: 1; animation: flash 1.5s infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes flash { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* ЭКРАН ВХОДА */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #logo { color: var(--neon); font-size: 30px; font-weight: bold; letter-spacing: 5px; margin-bottom: 30px; user-select: none; text-shadow: 0 0 15px var(--neon); }
        .v-box { width: 280px; height: 280px; border-radius: 50%; border: 2px solid var(--neon); overflow: hidden; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; inset: 0; }

        /* ЧАТ */
        #chat-ui { display: none; height: 100dvh; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 160px; }
        .m-bubble { background: #161b22; padding: 12px 16px; border-radius: 18px; border-left: 4px solid var(--neon); max-width: 85%; align-self: flex-start; position: relative; }
        .m-bubble b { color: var(--neon); font-size: 11px; display: block; margin-bottom: 5px; text-transform: uppercase; }
        .m-bubble img, .m-bubble video { max-width: 100%; border-radius: 12px; margin-top: 10px; border: 1px solid #333; }

        /* ПАНЕЛЬ ВВОДА */
        .bottom-bar { position: fixed; bottom: 0; width: 100%; background: rgba(5,7,10,0.98); border-top: 1px solid #222; z-index: 6000; }
        #preview { display: none; padding: 12px; background: #111; align-items: center; gap: 15px; border-bottom: 1px solid #333; }
        #preview img, #preview video { height: 60px; border-radius: 8px; border: 1px solid var(--neon); }
        .row { display: flex; padding: 15px; gap: 12px; align-items: center; }
        input { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 14px 20px; border-radius: 30px; }
        .btn-main { width: 50px; height: 50px; border-radius: 50%; background: var(--neon); border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        #admin-reg { display: none; margin-top: 25px; padding: 15px 40px; background: #ff00ff; border: none; border-radius: 35px; color: white; font-weight: bold; }
    </style>
</head>
<body>

    <div id="status"><span class="dot"></span>В СЕТИ: <span id="on-count">0</span></div>

    <div class="radio-zone">
        <div class="radio-btn" id="rad-btn" onclick="controlRadio()">EUROPA<br>PLUS</div>
        <svg class="bolt-svg" id="bolt-svg" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
    </div>

    <div id="auth-screen">
        <div id="logo">SONTAN SYSTEM</div>
        <div class="v-box">
            <video id="webcam" autoplay muted playsinline></video>
            <canvas id="face-cv"></canvas>
        </div>
        <button onclick="runFaceID()" style="margin-top:35px; padding:20px 70px; border-radius:40px; background:var(--neon); border:none; font-weight:bold; cursor:pointer;">ВОЙТИ</button>
        <button id="admin-reg" onclick="regFace()">НОВЫЙ ПОЛЬЗОВАТЕЛЬ</button>
    </div>

    <div id="chat-ui">
        <div id="messages"></div>
        <div class="bottom-bar">
            <div id="preview">
                <div id="thumb"></div>
                <button onclick="resetFile()" style="margin-left:auto; background:none; border:none; color:red; font-size:26px;">✕</button>
            </div>
            <div class="row">
                <button class="btn-main" onclick="document.getElementById('f-upload').click()">+</button>
                <input type="file" id="f-upload" hidden accept="image/*,video/*" onchange="makePreview(this)">
                <input type="text" id="m-text" placeholder="Сообщение...">
                <button class="btn-main" onclick="handleSend()">➤</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://gwegmxznhlmzejqdpykv.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3ZWdteHpuaGxtemVqcWRweWt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NTYwNjUsImV4cCI6MjA5MTAzMjA2NX0.LZM1GRtqylBxX-d_eze3OmfHsnfRQI4kROZpr_OIWx0';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        
        let myName = "Serega";
        let rad = new Audio('https://ep256.hostingradio.ru:8052/europaplus256.mp3');
        let fileData = null;

        // СЕКРЕТКА (УДЕРЖАНИЕ)
        const logo = document.getElementById('logo');
        logo.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            if(prompt("Пароль доступа:") === "Seregasib") document.getElementById('admin-reg').style.display = 'block';
        });

        function controlRadio() {
            const b = document.getElementById('rad-btn'), s = document.getElementById('bolt-svg');
            if (rad.paused) { rad.play(); b.classList.add('spinning'); s.classList.add('bolt-active'); }
            else { rad.pause(); b.classList.remove('spinning'); s.classList.remove('bolt-active'); }
        }

        async function runFaceID() {
            const URL_M = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
            await Promise.all([faceapi.nets.ssdMobilenetv1.loadFromUri(URL_M), faceapi.nets.faceLandmark68Net.loadFromUri(URL_M), faceapi.nets.faceRecognitionNet.loadFromUri(URL_M)]);
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('webcam').srcObject = stream;
            const { data: db } = await sb.from('allowed_faces').select('*');
            const v = document.getElementById('webcam'), c = document.getElementById('face-cv');
            faceapi.matchDimensions(c, { width: 280, height: 280 });

            const loop = setInterval(async () => {
                const dec = await faceapi.detectAllFaces(v).withFaceLandmarks().withFaceDescriptors();
                if (dec.length > 0) {
                    faceapi.draw.drawFaceLandmarks(c, faceapi.resizeResults(dec, { width: 280, height: 280 }));
                    dec.forEach(d => {
                        db?.forEach(u => {
                            if (faceapi.euclideanDistance(d.descriptor, new Float32Array(u.face_descriptor)) < 0.45) {
                                myName = u.name; clearInterval(loop); startApp();
                            }
                        });
                    });
                }
            }, 600);
        }

        function startApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('status').style.display = 'block';
            document.getElementById('chat-ui').style.display = 'flex';
            const channel = sb.channel('online-presence', { config: { presence: { key: myName } } });
            channel.on('presence', { event: 'sync' }, () => {
                document.getElementById('on-count').innerText = Object.keys(channel.presenceState()).length;
            }).subscribe(async (s) => { if(s==='SUBSCRIBED') await channel.track({ online: true }); });
            loadMessages();
            sb.channel('db-changes').on('postgres_changes', {event:'*', schema:'public', table:'messages'}, loadMessages).subscribe();
        }

        async function loadMessages() {
            const { data } = await sb.from('messages').select('*').order('created_at', { ascending: true });
            const box = document.getElementById('messages');
            box.innerHTML = '';
            data?.forEach(m => {
                const div = document.createElement('div');
                div.className = 'm-bubble';
                let html = `<b>${m.sender_name}</b>`;
                if(m.media_url) html += m.media_url.includes('mp4') ? `<video src="${m.media_url}" controls playsinline></video>` : `<img src="${m.media_url}">`;
                if(m.content) html += `<div>${m.content}</div>`;
                div.innerHTML = html;
                div.onclick = async () => { if(confirm("Удалить сообщение?")) await sb.from('messages').delete().eq('id', m.id); };
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        }

        function makePreview(el) {
            fileData = el.files[0]; if (!fileData) return;
            document.getElementById('preview').style.display = 'flex';
            document.getElementById('thumb').innerHTML = fileData.type.includes('video') ? `<video src="${URL.createObjectURL(fileData)}" muted></video>` : `<img src="${URL.createObjectURL(fileData)}">`;
        }

        function resetFile() {
            fileData = null; document.getElementById('f-upload').value = ''; document.getElementById('preview').style.display = 'none';
        }

        async function handleSend() {
            const input = document.getElementById('m-text');
            let url = null;
            if (fileData) {
                const path = Date.now() + "_" + fileData.name;
                const { data } = await sb.storage.from('uploads').upload(path, fileData);
                if (data) url = sb.storage.from('uploads').getPublicUrl(path).data.publicUrl;
                resetFile();
            }
            if (input.value || url) {
                await sb.from('messages').insert([{ sender_name: myName, content: input.value, media_url: url }]);
                input.value = '';
            }
        }

        async function regFace() {
            const name = prompt("Имя для базы:");
            const d = await faceapi.detectSingleFace(document.getElementById('webcam')).withFaceLandmarks().withFaceDescriptor();
            if (d && name) {
                await sb.from('allowed_faces').insert([{ name, face_descriptor: Array.from(d.descriptor) }]);
                alert("Успешно добавлено!");
            }
        }
    </script>
</body>
</html>
