<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sontan System Final</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --pink: #ff00ff; --bg: #05070a; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow: hidden; touch-action: none; }
        
        #space-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%); }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle var(--d) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* КРУГЛЫЕ КНОПКИ РАДИО */
        .radio-btn { 
            position: fixed; top: 20px; width: 55px; height: 55px; 
            border-radius: 50%; border: 2px solid var(--neon); 
            background: rgba(0,0,0,0.7); color: var(--neon);
            display: flex; align-items: center; justify-content: center;
            font-size: 9px; font-weight: bold; cursor: pointer; z-index: 2000;
            box-shadow: 0 0 15px var(--neon); transition: 0.3s; text-align: center;
        }
        .radio-btn.active { background: var(--neon); color: black; box-shadow: 0 0 25px var(--neon); }
        .r-left { left: 20px; border-color: var(--pink); color: var(--pink); box-shadow: 0 0 15px var(--pink); }
        .r-left.active { background: var(--pink); color: white; box-shadow: 0 0 25px var(--pink); }
        .r-right { right: 20px; }

        #auth-screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .v-container { position: relative; width: 280px; height: 280px; border-radius: 50%; overflow: hidden; border: 3px solid var(--neon); }
        video { width: 100%; height: 100%; object-fit: cover; }
        #canvas { position: absolute; top: 0; left: 0; z-index: 30; pointer-events: none; }
        #scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: var(--neon); box-shadow: 0 0 20px var(--neon); opacity: 0; z-index: 31; }
        @keyframes scanAnim { 0% { top: 0%; } 100% { top: 100%; } }

        /* ЧАТ */
        #chat-ui { display: none; height: 100dvh; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 110px; display: flex; flex-direction: column; gap: 12px; }
        .msg { background: rgba(26, 31, 41, 0.9); padding: 12px; border-radius: 15px; border-left: 4px solid var(--neon); align-self: flex-start; max-width: 80%; user-select: none; }
        
        .input-area { position: fixed; bottom: 0; width: 100%; height: 80px; padding: 15px; background: rgba(22, 27, 34, 0.98); display: flex; gap: 10px; box-sizing: border-box; z-index: 1001; }
        input { flex: 1; background: #0d1117; border: 1px solid var(--neon); color: white; padding: 12px; border-radius: 10px; outline: none; height: 50px; box-sizing: border-box; }
        .btn-send { background: var(--neon); color: black; border: none; padding: 0 20px; border-radius: 10px; font-weight: bold; height: 50px; }
    </style>
</head>
<body>

    <div id="space-bg"></div>

    <div id="btn-club" class="radio-btn r-left" onclick="toggleRadio('club')">RECORD<br>CLUB</div>
    <div id="btn-trap" class="radio-btn r-right" onclick="toggleRadio('trap')">RECORD<br>TRAP</div>

    <div id="auth-screen">
        <div id="logo" style="color:var(--neon); font-size:24px; margin-bottom:20px; text-shadow:0 0 10px var(--neon)">Sontan System</div>
        <div class="v-container">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="canvas" width="280" height="280"></canvas>
            <div id="scan-line"></div>
        </div>
        <button class="btn-send" style="margin-top:20px" onclick="initScanner()">SCAN FACE</button>
    </div>

    <div id="chat-ui">
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="m-input" placeholder="Написать...">
            <button class="btn-send" onclick="sendMsg()">></button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://gwegmxznhlmzejqdpykv.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3ZWdteHpuaGxtemVqcWRweWt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NTYwNjUsImV4cCI6MjA5MTAzMjA2NX0.LZM1GRtqylBxX-d_eze3OmfHsnfRQI4kROZpr_OIWx0';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        let myName = "Serega";

        // РАДИО
        const streams = {
            club: new Audio('https://air.radiorecord.ru:805/club_320'),
            trap: new Audio('https://air.radiorecord.ru:805/trap_320')
        };

        function toggleRadio(type) {
            const btn = document.getElementById('btn-' + type);
            if (streams[type].paused) {
                Object.values(streams).forEach(s => { s.pause(); s.currentTime = 0; });
                document.querySelectorAll('.radio-btn').forEach(b => b.classList.remove('active'));
                streams[type].play();
                btn.classList.add('active');
            } else {
                streams[type].pause();
                btn.classList.remove('active');
            }
        }

        // КОСМОС
        const bg = document.getElementById('space-bg');
        for(let i=0; i<80; i++) {
            let s = document.createElement('div');
            s.className = 'star';
            s.style.left = Math.random()*100+'%';
            s.style.top = Math.random()*100+'%';
            s.style.width = s.style.height = Math.random()*2+'px';
            s.style.setProperty('--d', Math.random()*3+2+'s');
            bg.appendChild(s);
        }

        // БИОМЕТРИЯ
        async function initScanner() {
            const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
            await Promise.all([
                faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
            ]);
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.getElementById('video');
            video.srcObject = stream;
            video.onloadedmetadata = () => { video.play(); checkFaces(); };
        }

        async function checkFaces() {
            const { data: users } = await supabaseClient.from('allowed_faces').select('*');
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const line = document.getElementById('scan-line');
            const displaySize = { width: 280, height: 280 };
            faceapi.matchDimensions(canvas, displaySize);

            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
                const resized = faceapi.resizeResults(detections, displaySize);
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, 280, 280);

                if (resized.length > 0) {
                    line.style.opacity = "1";
                    line.style.animation = "scanAnim 2s infinite linear";
                    faceapi.draw.drawFaceLandmarks(canvas, resized); // Линии на лице

                    resized.forEach(d => {
                        users?.forEach(u => {
                            if (faceapi.euclideanDistance(d.descriptor, new Float32Array(u.face_descriptor)) < 0.5) {
                                myName = u.name;
                                startChat();
                            }
                        });
                    });
                }
            }, 200);
        }

        function startChat() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'flex';
            loadMsgs(); listen();
        }

        // ЧАТ И УДАЛЕНИЕ
        async function sendMsg() {
            const i = document.getElementById('m-input');
            if (!i.value) return;
            await supabaseClient.from('messages').insert([{ sender_name: myName, content: i.value }]);
            i.value = '';
        }

        async function loadMsgs() {
            const { data } = await supabaseClient.from('messages').select('*').order('created_at', { ascending: true });
            const b = document.getElementById('messages');
            b.innerHTML = '';
            data?.forEach(m => {
                const div = document.createElement('div');
                div.className = 'msg';
                div.innerHTML = `<b>${m.sender_name}:</b><br>${m.content}`;
                
                // ЛОГИКА УДЕРЖАНИЯ (Long Press)
                let timer;
                div.onpointerdown = () => {
                    timer = setTimeout(async () => {
                        const action = prompt("1 - Удалить у себя, 2 - Удалить у всех, 0 - Отмена");
                        if (action === "1") div.remove();
                        if (action === "2") await supabaseClient.from('messages').delete().eq('id', m.id);
                    }, 800);
                };
                div.onpointerup = () => clearTimeout(timer);
                div.onpointerleave = () => clearTimeout(timer);

                b.appendChild(div);
            });
            b.scrollTop = b.scrollHeight;
        }

        function listen() {
            supabaseClient.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => loadMsgs()).subscribe();
        }
    </script>
</body>
</html>
