 <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sontan System Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --pink: #ff00ff; --bg: #05070a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        
        /* КОСМИЧЕСКИЙ ФОН */
        #space-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%); }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle var(--d) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* РАДИО ПО УГЛАМ */
        .radio-box { position: fixed; top: 10px; z-index: 2000; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 8px; border: 1px solid var(--neon); font-size: 10px; }
        .left-top { left: 10px; }
        .right-top { right: 10px; }
        iframe { border: none; width: 140px; height: 40px; }

        #auth-screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        
        /* СКАНЕР ТРАНСФОРМЕР */
        .v-container { position: relative; width: 300px; height: 300px; border-radius: 50%; overflow: hidden; border: 4px double var(--neon); box-shadow: 0 0 20px var(--neon); }
        video { width: 100%; height: 100%; object-fit: cover; filter: brightness(1.2) contrast(1.1); }
        #canvas { position: absolute; top: 0; left: 0; z-index: 20; }
        #scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--neon); box-shadow: 0 0 15px var(--neon); opacity: 0; z-index: 22; }

        #logo { color: var(--neon); font-size: 28px; font-weight: bold; text-shadow: 0 0 15px var(--neon); margin-bottom: 20px; }

        /* ЧАТ */
        #chat-ui { display: none; height: 100dvh; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: rgba(26, 31, 41, 0.8); padding: 12px; border-radius: 15px; border-left: 4px solid var(--neon); align-self: flex-start; cursor: pointer; transition: 0.2s; }
        .msg:active { transform: scale(0.95); opacity: 0.7; }
        
        .input-area { position: fixed; bottom: 0; width: 100%; padding: 15px; background: rgba(22, 27, 34, 0.95); display: flex; gap: 10px; box-sizing: border-box; }
        input { flex: 1; background: #0d1117; border: 1px solid var(--neon); color: white; padding: 12px; border-radius: 10px; outline: none; }
        .btn { background: var(--neon); color: black; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="space-bg"></div>

    <div class="radio-box left-top">
        <div>CLUB MUSIC</div>
        <audio controls style="width: 120px; height: 30px;"><source src="https://radio-holding.ru:9433/marusya_fm" type="audio/mpeg"></audio>
    </div>
    <div class="radio-box right-top">
        <div>RAP LIVE</div>
        <audio controls style="width: 120px; height: 30px;"><source src="http://air.radiorecord.ru:805/black_main" type="audio/mpeg"></audio>
    </div>

    <div id="auth-screen">
        <div id="logo">Sontan System</div>
        <div class="v-container">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="canvas" width="300" height="300"></canvas>
            <div id="scan-line"></div>
        </div>
        <button class="btn" style="margin-top:20px" onclick="initScanner()">ЗАПУСТИТЬ СКАНЕР</button>
    </div>

    <div id="chat-ui">
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="m-input" placeholder="Космос на связи...">
            <button class="btn" onclick="sendMsg()">></button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://gwegmxznhlmzejqdpykv.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3ZWdteHpuaGxtemVqcWRweWt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NTYwNjUsImV4cCI6MjA5MTAzMjA2NX0.LZM1GRtqylBxX-d_eze3OmfHsnfRQI4kROZpr_OIWx0';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        let myName = "Serega";

        // Создание звезд
        const bg = document.getElementById('space-bg');
        for(let i=0; i<100; i++) {
            let s = document.createElement('div');
            s.className = 'star';
            s.style.left = Math.random()*100+'%';
            s.style.top = Math.random()*100+'%';
            s.style.width = s.style.height = Math.random()*3+'px';
            s.style.setProperty('--d', Math.random()*3+2+'s');
            bg.appendChild(s);
        }

        async function initScanner() {
            const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
            await Promise.all([
                faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
            ]);
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('video').srcObject = stream;
            checkFaces();
        }

        async function checkFaces() {
            const { data: users } = await supabaseClient.from('allowed_faces').select('*');
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const line = document.getElementById('scan-line');
            const displaySize = { width: 300, height: 300 };
            faceapi.matchDimensions(canvas, displaySize);

            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
                const resized = faceapi.resizeResults(detections, displaySize);
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, 300, 300);

                if (resized.length > 0) {
                    line.style.opacity = "1";
                    line.style.animation = "scanAnim 2s infinite linear";
                    // Рисуем сетку Landmarks
                    faceapi.draw.drawFaceLandmarks(canvas, resized);

                    resized.forEach(d => {
                        users?.forEach(u => {
                            if (faceapi.euclideanDistance(d.descriptor, new Float32Array(u.face_descriptor)) < 0.5) {
                                myName = u.name;
                                startChat();
                            }
                        });
                    });
                }
            }, 200);
        }

        function startChat() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'flex';
            loadMsgs(); listen();
        }

        async function sendMsg() {
            const i = document.getElementById('m-input');
            if (!i.value) return;
            await supabaseClient.from('messages').insert([{ sender_name: myName, content: i.value }]);
            i.value = '';
        }

        async function loadMsgs() {
            const { data } = await supabaseClient.from('messages').select('*').order('created_at', { ascending: true });
            document.getElementById('messages').innerHTML = '';
            data?.forEach(m => render(m));
        }

        function listen() {
            supabaseClient.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => loadMsgs()).subscribe();
        }

        // УДАЛЕНИЕ СООБЩЕНИЯ
        async function deleteMsg(id) {
            if(confirm("Удалить это сообщение?")) {
                await supabaseClient.from('messages').delete().eq('id', id);
            }
        }

        function render(m) {
            const b = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<b>${m.sender_name}:</b><br>${m.content}`;
            div.onclick = () => deleteMsg(m.id); // Удаление по клику
            b.appendChild(div);
            b.scrollTop = b.scrollHeight;
        }
    </script>
</body>
</html>
