<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sontan System Smooth Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --pink: #ff00ff; --bg: #05070a; --msg-bg: #1a1f29; }
        
        * { transition: all 0.3s ease; box-sizing: border-box; }

        body { background: var(--bg); color: white; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; overflow: hidden; touch-action: none; height: 100dvh; }
        
        /* КНОПКА РАДИО С ВРАЩЕНИЕМ */
        .radio-container {
            position: fixed; top: 20px; right: 20px; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }

        .radio-btn { 
            width: 65px; height: 65px; 
            border-radius: 50%; border: 2px solid var(--neon); 
            background: rgba(0,0,0,0.8); color: var(--neon);
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: bold; 
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
            cursor: pointer; text-align: center;
            position: relative; overflow: hidden;
        }

        /* Анимация вращения при активе */
        .active .spin-logo { animation: rotateLogo 4s linear infinite; }
        .active { box-shadow: 0 0 30px var(--neon) !important; background: rgba(0, 242, 255, 0.1); }

        @keyframes rotateLogo { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ЦВЕТОМУЗЫКА МОЛНИЯ */
        #lightning-visualizer {
            width: 40px; height: 150px;
            opacity: 0; filter: drop-shadow(0 0 5px var(--neon));
        }
        .active + #lightning-visualizer { opacity: 1; }

        /* ЭКРАНЫ */
        #auth-screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; background: var(--bg); padding: 20px; }
        .v-container { position: relative; width: 280px; height: 280px; border-radius: 50%; overflow: hidden; border: 2px solid var(--neon); box-shadow: 0 0 20px rgba(0,242,255,0.2); }
        video { width: 100%; height: 100%; object-fit: cover; }
        #canvas { position: absolute; top: 0; left: 0; z-index: 1001; pointer-events: none; }

        #chat-ui { opacity: 0; display: none; height: 100%; flex-direction: column; }
        
        /* СООБЩЕНИЯ */
        #messages { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .msg { background: var(--msg-bg); padding: 12px 16px; border-radius: 18px; border-left: 4px solid transparent; align-self: flex-start; max-width: 85%; position: relative; word-wrap: break-word; webkit-touch-callout: none; user-select: none; }
        .msg.my-msg { border-left-color: var(--neon); background: #1e2533; }
        .msg b { color: var(--neon); font-size: 0.9em; display: block; margin-bottom: 4px; }
        .msg-content { line-height: 1.4; }
        
        /* Медиа в сообщениях */
        .msg-media { max-width: 100%; max-height: 250px; border-radius: 10px; margin-top: 8px; display: block; cursor: pointer; }

        /* КОНТЕКСТНОЕ МЕНЮ (УДАЛЕНИЕ) */
        #context-menu {
            display: none; position: fixed; background: #161b22; border: 1px solid #333;
            border-radius: 12px; z-index: 10000; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            overflow: hidden; width: 180px;
        }
        .menu-item { padding: 14px 16px; cursor: pointer; color: white; font-size: 14px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 10px; }
        .menu-item:last-child { border-bottom: none; }
        .menu-item:active { background: #222; }
        .menu-item.del-all { color: var(--pink); }

        /* ИНПУТ ЗОНА */
        .input-area { position: fixed; bottom: 0; width: 100%; padding: 12px; background: #10141b; display: flex; align-items: flex-end; gap: 10px; border-top: 1px solid #222; }
        .input-wrapper { flex: 1; position: relative; background: #0d1117; border: 1px solid #333; border-radius: 20px; display: flex; align-items: center; padding: 0 10px; }
        .input-wrapper:focus-within { border-color: var(--neon); box-shadow: 0 0 10px rgba(0,242,255,0.1); }
        
        textarea { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; resize: none; font-family: sans-serif; font-size: 15px; max-height: 100px; overflow-y: auto; }
        
        .btn-icon { background: transparent; border: none; color: #888; font-size: 20px; padding: 10px; cursor: pointer; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .btn-icon:active { background: rgba(255,255,255,0.1); color: white; }
        .btn-send { color: var(--neon); font-weight: bold; }
        
        #file-input { display: none; }
        
        /* Предпросмотр перед отправкой */
        #preview-area { display: none; padding: 10px; background: #161b22; border-top: 1px solid #222; align-items: center; gap: 10px; }
        #preview-msg { max-height: 60px; max-width: 60px; border-radius: 5px; object-fit: cover; }
        #cancel-preview { color: var(--pink); cursor: pointer; font-weight: bold; padding: 10px; }

        .btn-reg { background: var(--pink); color: white; display: none; padding: 12px; border-radius: 10px; margin-top: 15px; border: none; font-weight: bold; width: 100%; cursor: pointer;}
        
        /* Лоадер загрузки файла */
        #upload-loader { display: none; position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; color: var(--neon); z-index: 10001; font-size: 12px; border: 1px solid var(--neon); }

    </style>
</head>
<body>

        <div class="radio-btn" id="radioMain" onclick="toggleRadio()">
            <div class="spin-logo">EUROPA<br>PLUS</div>
        </div>
        <svg id="lightning-visualizer" viewBox="0 0 50 150" preserveAspectRatio="none">
            <path id="lightning-path" d="M25,0 L40,40 L20,50 L45,90 L15,100 L30,150" stroke="#00f2ff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>

    <div id="context-menu">

        <div class="menu-item del-all" onclick="deleteMessage('all')">💥 Удалить у всех</div>
        <div class="menu-item" onclick="closeContextMenu()">❌ Отмена</div>
    </div>
