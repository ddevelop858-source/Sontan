<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sontan Ultimate</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --pink: #ff00ff; --bg: #0b0e14; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow: hidden; touch-action: none; }
        
        #auth-screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); z-index: 100; text-align: center; }
        
        .v-container { position: relative; width: 320px; height: 240px; margin: 20px 0; border-radius: 15px; overflow: hidden; border: 2px solid #1a1f29; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Холст для линий биометрии - ПОВЕРХ ВСЕГО */
        #canvas { position: absolute; top: 0; left: 0; z-index: 20; pointer-events: none; }

        #scanner-overlay { position: absolute; inset: 15px; border: 2px solid rgba(255,255,255,0.1); border-radius: 10px; opacity: 0; z-index: 21; }
        #scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--neon); box-shadow: 0 0 15px var(--neon); opacity: 0; z-index: 22; }
        @keyframes scanAnim { 0% { top: 0%; } 100% { top: 100%; } }

        #logo { color: var(--neon); font-size: 26px; font-weight: bold; cursor: pointer; padding: 10px; text-shadow: 0 0 10px var(--neon); }

        /* --- ИСПРАВЛЕННЫЙ ЧАТ --- */
        #chat-ui { display: none; height: 100dvh; flex-direction: column; background: var(--bg); position: relative; }
        
        #messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            padding-bottom: 90px; /* Чтобы сообщения не прятались за вводом */
        }
        
        .msg { 
            background: #1a1f29; 
            padding: 12px; 
            border-radius: 12px; 
            border-left: 4px solid var(--neon); 
            align-self: flex-start; 
            max-width: 80%;
            word-wrap: break-word;
        }

        .input-area { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            padding: 15px; 
            background: #161b22; 
            display: flex; 
            gap: 10px; 
            border-top: 1px solid #30363d; 
            z-index: 1000; 
        }

        input { 
            flex: 1; 
            background: #0d1117; 
            border: 1px solid #30363d; 
            color: white; 
            padding: 12px; 
            border-radius: 8px; 
            outline: none; 
            font-size: 16px;
        }
        
        .btn { background: var(--neon); color: black; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-reg { background: var(--pink); color: white; display: none; border: none; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div id="logo">Sontan System</div> 
        <div class="v-container">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="canvas" width="320" height="240"></canvas>
            <div id="scanner-overlay"></div>
            <div id="scan-line"></div>
        </div>
        <div class="controls">
            <button class="btn" onclick="initScanner()">ЗАПУСТИТЬ СКАНЕР</button>
            <button id="reg-btn" class="btn-reg" onclick="registerGuest()">ЗАРЕГИСТРИРОВАТЬ ГОСТЯ</button>
        </div>
    </div>

    <div id="chat-ui">
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="m-input" placeholder="Написать сообщение...">
            <button class="btn" onclick="sendMsg()">></button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://gwegmxznhlmzejqdpykv.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3ZWdteHpuaGxtemVqcWRweWt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NTYwNjUsImV4cCI6MjA5MTAzMjA2NX0.LZM1GRtqylBxX-d_eze3OmfHsnfRQI4kROZpr_OIWx0';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        let myName = "Serega";

        // --- СЕКРЕТНЫЙ КОД ---
        let pressTimer;
        const logo = document.getElementById('logo');
        const askCode = () => {
            const pass = prompt("Кодовое слово:");
            if (pass === "Seregasib") {
                document.getElementById('reg-btn').style.display = 'block';
                alert("Режим регистрации активирован!");
            }
        };

        logo.addEventListener('touchstart', (e) => { e.preventDefault(); pressTimer = setTimeout(askCode, 2000); });
        logo.addEventListener('touchend', () => clearTimeout(pressTimer));
        logo.addEventListener('mousedown', () => pressTimer = setTimeout(askCode, 2000));
        logo.addEventListener('mouseup', () => clearTimeout(pressTimer));

        // --- БИОМЕТРИЯ С ЛИНИЯМИ ---
        async function initScanner() {
            logo.innerText = "Загрузка модулей...";
            try {
                const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
                await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);

                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('video').srcObject = stream;
                logo.innerText = "Идет сканирование...";
                
                checkFaces();
            } catch (e) { alert("Ошибка доступа к камере"); }
        }

        async function checkFaces() {
            const { data: users } = await supabaseClient.from('allowed_faces').select('*');
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const displaySize = { width: 320, height: 240 };
            faceapi.matchDimensions(canvas, displaySize);

            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
                const resized = faceapi.resizeResults(detections, displaySize);
                
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (resized.length > 0) {
                    document.getElementById('scanner-overlay').style.opacity = "1";
                    document.getElementById('scan-line').style.opacity = "1";
                    document.getElementById('scan-line').style.animation = "scanAnim 1.5s infinite linear";

                    // РИСУЕМ СЕТКУ (Landmarks)
                    faceapi.draw.drawFaceLandmarks(canvas, resized);

                    resized.forEach(d => {
                        users?.forEach(u => {
                            if (faceapi.euclideanDistance(d.descriptor, new Float32Array(u.face_descriptor)) < 0.5) {
                                myName = u.name;
                                startChat();
                            }
                        });
                    });
                } else {
                    document.getElementById('scanner-overlay').style.opacity = "0";
                    document.getElementById('scan-line').style.opacity = "0";
                }
            }, 200);
        }

        // --- ЛОГИКА ЧАТА ---
        function startChat() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'flex';
            loadMsgs(); listen();
        }

        async function sendMsg() {
            const i = document.getElementById('m-input');
            if (!i.value) return;
            await supabaseClient.from('messages').insert([{ sender_name: myName, content: i.value }]);
            i.value = '';
        }

        async function loadMsgs() {
            const { data } = await supabaseClient.from('messages').select('*').order('created_at', { ascending: true });
            document.getElementById('messages').innerHTML = '';
            data?.forEach(m => render(m));
        }

        function listen() {
            supabaseClient.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => render(p.new)).subscribe();
        }

        function render(m) {
            const b = document.getElementById('messages');
            b.innerHTML += `<div class="msg"><b>${m.sender_name}:</b><br>${m.content}</div>`;
            b.scrollTop = b.scrollHeight;
        }

        async function registerGuest() {
            const name = prompt("Имя гостя:");
            if (!name) return;
            const video = document.getElementById('video');
            const detect = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
            if (detect) {
                await supabaseClient.from('allowed_faces').insert([{ name: name, face_descriptor: Array.from(detect.descriptor) }]);
                alert("Гость добавлен!");
            }
        }
    </script>
</body>
</html>
