<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sontan Final Fixed</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        :root { --bg: #1c242c; --bar: #242d37; --blue: #0084ff; --bubble: #2b3541; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; height: 100dvh; }

        /* ЭКРАН ВХОДА */
        #auth { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .v-ring { width: 280px; height: 280px; border-radius: 50%; border: 2px solid var(--blue); overflow: hidden; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #reg-btn { display: none; margin-top: 20px; color: #444; background: none; border: 1px solid #333; padding: 5px 15px; border-radius: 10px; font-size: 12px; }

        /* ЧАТ */
        #chat-ui { display: none; flex-direction: column; height: 100dvh; }
        header { background: var(--bar); height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #141a21; position: fixed; top: 0; width: 100%; z-index: 10; }
        .logo { font-size: 20px; font-weight: bold; cursor: pointer; }
        
        #msgs { flex: 1; overflow-y: auto; padding: 75px 15px 100px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 16px 16px 16px 4px; background: var(--bubble); align-self: flex-start; animation: pop 0.2s; }
        @keyframes pop { from { opacity: 0; transform: translateY(5px); } }
        .msg b { color: var(--blue); font-size: 11px; display: block; margin-bottom: 3px; }
        .msg img { max-width: 100%; border-radius: 10px; margin-top: 5px; }

        /* НИЖНЯЯ ПАНЕЛЬ */
        .bar { background: var(--bar); padding: 10px 15px 30px; display: flex; align-items: center; gap: 12px; position: fixed; bottom: 0; width: 100%; z-index: 10; }
        input[type="text"] { flex: 1; background: #1c242c; border: none; color: white; padding: 12px 18px; border-radius: 25px; font-size: 16px; }
        .icon { background: none; border: none; color: #8a949b; font-size: 24px; cursor: pointer; }
        .rec-active { color: #ff3b30 !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        
        #rad { width: 40px; height: 40px; border: 2px solid var(--blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 7px; text-align: center; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth">
        <h1 style="letter-spacing: 5px; margin-bottom: 20px;">SONTAN</h1>
        <div class="v-ring">
            <video id="v" autoplay muted playsinline></video>
            <canvas id="c" style="position:absolute; inset:0;"></canvas>
        </div>
        <button id="go" onclick="startScan()" style="margin-top:40px; padding:15px 60px; border-radius:30px; background:var(--blue); border:none; color:white; font-weight:bold; cursor:pointer;">ВОЙТИ</button>
        <button id="reg-btn" onclick="register()">REGISTRATION</button>
    </div>

    <div id="chat-ui">
        <header>
            <div class="logo" onclick="clickSecret()">Sontan</div>
            <div style="font-size:11px; color:#8a949b;">Online: <span id="count">0</span></div>
            <div id="rad" onclick="toggleRad()">EUROPA<br>PLUS</div>
        </header>

        <div id="msgs"></div>

        <div class="bar">
            <button class="icon" onclick="document.getElementById('f').click()">📎</button>
            <input type="file" id="f" hidden onchange="window.selectedFile = this.files[0]; alert('Файл готов');">
            <input type="text" id="t" placeholder="Сообщение">
            <button class="icon" id="mic" onclick="handleMic()">🎤</button>
            <button class="icon" style="color:var(--blue);" onclick="send()">➤</button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://gwegmxznhlmzejqdpykv.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3ZWdteHpuaGxtemVqcWRweWt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NTYwNjUsImV4cCI6MjA5MTAzMjA2NX0.LZM1GRtqylBxX-d_eze3OmfHsnfRQI4kROZpr_OIWx0';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        let myName = localStorage.getItem('s_name') || null;
        let radio = new Audio('https://ep256.hostingradio.ru:8052/europaplus256.mp3');
        let rec, chunks = [], isRec = false, sClicks = 0;

        function clickSecret() {
            sClicks++;
            if(sClicks === 5) {
                if(prompt("Пароль:") === "Seregasib") document.getElementById('reg-btn').style.display = 'block';
                sClicks = 0;
            }
        }

        async function startScan() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('v').srcObject = stream;
            const M = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
            await Promise.all([faceapi.nets.ssdMobilenetv1.loadFromUri(M), faceapi.nets.faceLandmark68Net.loadFromUri(M), faceapi.nets.faceRecognitionNet.loadFromUri(M)]);
            
            const { data: users } = await sb.from('allowed_faces').select('*');
            const loop = setInterval(async () => {
                const dec = await faceapi.detectSingleFace('v').withFaceLandmarks().withFaceDescriptor();
                if(dec) {
                    for (let u of users) {
                        if(faceapi.euclideanDistance(dec.descriptor, new Float32Array(u.face_descriptor)) < 0.45) {
                            myName = u.name;
                            localStorage.setItem('s_name', myName);
                            clearInterval(loop); stream.getTracks().forEach(t => t.stop());
                            document.getElementById('auth').style.display = 'none';
                            document.getElementById('chat-ui').style.display = 'flex';
                            initChat();
                        }
                    }
                }
            }, 700);
        }

        function initChat() {
            render();
            sb.channel('db').on('postgres_changes', {event:'*', schema:'public', table:'messages'}, render).subscribe();
            const p = sb.channel('p').on('presence', {event:'sync'}, () => {
                document.getElementById('count').innerText = Object.keys(p.presenceState()).length;
            }).subscribe(async (s) => { if(s==='SUBSCRIBED') await p.track({u:myName}); });
        }

        async function render() {
            const { data } = await sb.from('messages').select('*').order('created_at', { ascending: true });
            const box = document.getElementById('msgs');
            box.innerHTML = '';
            data?.forEach(m => {
                const div = document.createElement('div');
                div.className = 'msg';
                let html = `<b>${m.sender_name}</b>`;
                if(m.media_url) {
                    if(m.media_url.includes('.webm')) html += `<button onclick="new Audio('${m.media_url}').play()" style="background:var(--blue); border:none; border-radius:50%; width:30px; height:30px; color:white;">▶</button> Голосовое`;
                    else html += `<img src="${m.media_url}" style="width:100%">`;
                }
                if(m.content) html += `<div>${m.content}</div>`;
                div.innerHTML = html;
                div.onclick = () => { if(confirm("Удалить?")) sb.from('messages').delete().eq('id', m.id); };
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        }

        async function handleMic() {
            const btn = document.getElementById('mic');
            if(!isRec) {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                rec = new MediaRecorder(s); chunks = [];
                rec.ondataavailable = e => chunks.push(e.data);
                rec.onstop = async () => {
                    const file = new File([new Blob(chunks, { type: 'audio/webm' })], "v.webm");
                    await push(file, "");
                };
                rec.start(); isRec = true; btn.classList.add('rec-active');
            } else {
                rec.stop(); isRec = false; btn.classList.remove('rec-active');
            }
        }

        async function send() {
            const i = document.getElementById('t');
            const txt = i.value.trim();
            const f = window.selectedFile;
            if(!txt && !f) return;
            i.value = '';
            await push(f, txt);
            window.selectedFile = null;
        }

        async function push(file, text) {
            let url = null;
            if(file) {
                const path = Date.now() + "_file";
                await sb.storage.from('uploads').upload(path, file);
                url = sb.storage.from('uploads').getPublicUrl(path).data.publicUrl;
            }
            const sender = myName || localStorage.getItem('s_name') || "User";
            await sb.from('messages').insert([{ sender_name: sender, content: text, media_url: url }]);
        }

        function toggleRad() {
            if(radio.paused) radio.play(); else radio.pause();
        }

        async function register() {
            const n = prompt("Имя:");
            const d = await faceapi.detectSingleFace('v').withFaceLandmarks().withFaceDescriptor();
            if(d && n) await sb.from('allowed_faces').insert([{ name: n, face_descriptor: Array.from(d.descriptor) }]);
        }
    </script>
</body>
</html>
