    <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sontan System Final</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #05070a; }
        * { transition: all 0.3s ease; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow: hidden; height: 100dvh; }

        /* РАДИО (КАК БЫЛО) */
        .radio-container { position: fixed; top: 25px; right: 25px; z-index: 10000; display: flex; flex-direction: column; align-items: center; }
        .radio-btn { 
            width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--neon); 
            background: rgba(0,0,0,0.8); color: var(--neon); display: flex; align-items: center; 
            justify-content: center; font-size: 11px; font-weight: bold; cursor: pointer; text-align: center;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }
        .spinning { animation: rotate 5s linear infinite; box-shadow: 0 0 30px var(--neon) !important; background: var(--neon) !important; color: black !important; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        #lightning { width: 40px; height: 70px; opacity: 0; pointer-events: none; margin-top: 5px; }

        /* ЭКРАН ВХОДА */
        #auth-screen { position: fixed; inset: 0; display: flex !important; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); z-index: 9999; }
        .v-container { width: 250px; height: 250px; border-radius: 50%; overflow: hidden; border: 3px solid var(--neon); }
        video#cam { width: 100%; height: 100%; object-fit: cover; }

        /* ЧАТ (ИСПРАВЛЕННЫЕ ОТСТУПЫ) */
        #chat-ui { display: none; height: 100dvh; flex-direction: column; }
        #messages { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; 
            margin-top: 130px; /* Сообщения не будут обрезаться сверху */
            padding-bottom: 100px; 
        }
        .msg { background: #161b22; padding: 12px; border-radius: 18px; max-width: 85%; border-left: 3px solid var(--neon); align-self: flex-start; position: relative; }
        .msg b { color: var(--neon); font-size: 11px; display: block; margin-bottom: 5px; text-transform: uppercase; }
        .msg-media { max-width: 100%; border-radius: 12px; margin-top: 8px; border: 1px solid rgba(0, 242, 255, 0.3); }

        /* ВВОД */
        .input-area { position: fixed; bottom: 0; width: 100%; padding: 15px; background: #0d1117; display: flex; gap: 10px; border-top: 1px solid #1a1f29; }
        input[type="text"] { flex: 1; background: #161b22; border: 1px solid var(--neon); color: white; padding: 12px; border-radius: 12px; outline: none; }
        .btn-action { background: var(--neon); color: black; border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* МЕНЮ УДАЛЕНИЯ */
        #context-menu { display: none; position: fixed; background: #1a1f29; border: 2px solid var(--neon); border-radius: 15px; z-index: 20000; overflow: hidden; }
        .menu-item { padding: 15px 20px; cursor: pointer; color: #ff4d4d; font-weight: bold; font-size: 14px; }
        .menu-item:active { background: rgba(255, 77, 77, 0.1); }
    </style>
</head>
<body>

    <div class="radio-container">
        <div class="radio-btn" id="radioMain" onclick="toggleRadio()">EUROPA<br>PLUS</div>
        <svg id="lightning" viewBox="0 0 50 100">
            <path id="bolt" d="M25,0 L35,30 L15,40 L40,70 L10,80 L30,100" stroke="#00f2ff" fill="none" stroke-width="3"/>
        </svg>
    </div>

    <div id="auth-screen">
        <div style="color:var(--neon); font-size: 20px; letter-spacing: 3px; margin-bottom: 25px;" ondblclick="unlockReg()">SONTAN SYSTEM</div>
        <div class="v-container"><video id="cam" autoplay muted playsinline></video></div>
        <button class="btn-action" style="margin-top: 30px; width: 200px;" onclick="startSession()">ВХОД</button>
        <button id="reg-btn" style="display:none; margin-top:10px;" class="btn-action" onclick="alert('Регистрация... зажмите логотип для пароля')">РЕГИСТРАЦИЯ</button>
    </div>

    <div id="chat-ui">
        <div id="messages"></div>
        <div class="input-area">
            <button class="btn-action" onclick="document.getElementById('file-input').click()">+</button>
            <input type="file" id="file-input" hidden accept="image/*,video/*" onchange="uploadFile(this)">
            <input type="text" id="m-input" placeholder="Введите сообщение...">
            <button class="btn-action" onclick="sendMsg()">➤</button>
        </div>
    </div>

    <div id="context-menu" onclick="closeMenu()">
        <div class="menu-item" onclick="deleteMessage()">Удалить у всех</div>
    </div>

    <script>
        const SB_URL = 'https://gwegmxznhlmzejqdpykv.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3ZWdteHpuaGxtemVqcWRweWt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NTYwNjUsImV4cCI6MjA5MTAzMjA2NX0.LZM1GRtqylBxX-d_eze3OmfHsnfRQI4kROZpr_OIWx0';
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        let user = "Serega";
        let selId = null;
        let player = new Audio('https://ep256.hostingradio.ru:8052/europaplus256.mp3');

        function toggleRadio() {
            const btn = document.getElementById('radioMain');
            const lgt = document.getElementById('lightning');
            if (player.paused) {
                player.play();
                btn.classList.add('spinning');
                lgt.style.opacity = '1';
                flash();
            } else {
                player.pause();
                btn.classList.remove('spinning');
                lgt.style.opacity = '0';
            }
        }

        function flash() {
            if(player.paused) return;
            const b = document.getElementById('bolt');
            const r = () => Math.random() * 15;
            b.setAttribute('d', `M25,0 L${30+r()},30 L${10+r()},40 L${35+r()},70 L${5+r()},80 L30,100`);
            setTimeout(flash, 70);
        }

        async function startSession() {
            const s = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('cam').srcObject = s;
            setTimeout(() => {
                document.getElementById('auth-screen').style.setProperty('display', 'none', 'important');
                document.getElementById('chat-ui').style.display = 'flex';
                load();
                supabase.channel('room1').on('postgres_changes', {event:'*', schema:'public', table:'messages'}, load).subscribe();
            }, 1500);
        }

        async function load() {
            const { data } = await supabase.from('messages').select('*').order('created_at', { ascending: true });
            const box = document.getElementById('messages');
            box.innerHTML = '';
            data?.forEach(m => {
                const d = document.createElement('div');
                d.className = 'msg';
                d.innerHTML = `<b>${m.sender_name}</b>`;
                
                if(m.media_url) {
                    if(m.media_url.includes('.mp4') || m.media_url.includes('.mov')) {
                        d.innerHTML += `<video src="${m.media_url}" class="msg-media" controls></video>`;
                    } else {
                        d.innerHTML += `<img src="${m.media_url}" class="msg-media">`;
                    }
                }
                if(m.content) d.innerHTML += `<span>${m.content}</span>`;
                
                let timer;
                d.ontouchstart = (e) => timer = setTimeout(() => showMenu(e, m.id), 700);
                d.ontouchend = () => clearTimeout(timer);
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        }

        async function sendMsg() {
            const i = document.getElementById('m-input');
            if(!i.value) return;
            await supabase.from('messages').insert([{ sender_name: user, content: i.value }]);
            i.value = '';
        }

        async function uploadFile(el) {
            const f = el.files[0];
            if(!f) return;
            const name = Date.now() + '_' + f.name;
            const { data } = await supabase.storage.from('uploads').upload(name, f);
            if(data) {
                const { data: url } = supabase.storage.from('uploads').getPublicUrl(name);
                await supabase.from('messages').insert([{ sender_name: user, media_url: url.publicUrl, content: "" }]);
            } else { alert("Ошибка! Проверь бакет uploads и Policies"); }
        }

        function showMenu(e, id) {
            selId = id;
            const m = document.getElementById('context-menu');
            m.style.display = 'block';
            m.style.left = e.touches[0].clientX + 'px';
            m.style.top = e.touches[0].clientY + 'px';
        }

        function closeMenu() { document.getElementById('context-menu').style.display = 'none'; }
        async function deleteMessage() { await supabase.from('messages').delete().eq('id', selId); }
        function unlockReg() { if(prompt("Pass:") === "Seregasib") document.getElementById('reg-btn').style.display = 'block'; }
    </script>
</body>
</html>
