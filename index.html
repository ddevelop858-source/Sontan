<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sontan System Smooth</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --pink: #ff00ff; --bg: #05070a; }
        
        * { transition: all 0.5s ease; } /* Плавность для всего */

        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow: hidden; touch-action: none; }
        
        /* ОДНА КНОПКА СПРАВА */
        .radio-btn { 
            position: fixed; top: 20px; right: 20px; width: 65px; height: 65px; 
            border-radius: 50%; border: 2px solid var(--neon); 
            background: rgba(0,0,0,0.8); color: var(--neon);
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: bold; z-index: 9999; 
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
            cursor: pointer; text-align: center;
        }
        .active { background: var(--neon) !important; color: black !important; box-shadow: 0 0 30px var(--neon) !important; }

        #auth-screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; background: var(--bg); }
        .v-container { position: relative; width: 280px; height: 280px; border-radius: 50%; overflow: hidden; border: 2px solid var(--neon); }
        video { width: 100%; height: 100%; object-fit: cover; }
        #canvas { position: absolute; top: 0; left: 0; z-index: 1001; pointer-events: none; }

        #chat-ui { opacity: 0; display: none; height: 100dvh; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #1a1f29; padding: 12px; border-radius: 15px; border-left: 4px solid var(--neon); align-self: flex-start; max-width: 85%; }
        
        .input-area { position: fixed; bottom: 0; width: 100%; padding: 15px; background: #161b22; display: flex; gap: 10px; box-sizing: border-box; }
        input { flex: 1; background: #0d1117; border: 1px solid var(--neon); color: white; padding: 12px; border-radius: 10px; outline: none; }
        .btn-send { background: var(--neon); color: black; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; }
        .btn-reg { background: var(--pink); color: white; display: none; padding: 12px; border-radius: 10px; margin-top: 15px; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="radio-btn" id="radioMain" onclick="toggleRadio()">EUROPA<br>PLUS</div>

    <div id="auth-screen">
        <div id="logo" style="color:var(--neon); font-size: 24px; margin-bottom: 20px; font-weight: bold;" ondblclick="unlockReg()">Sontan System</div>
        <div class="v-container">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="canvas" width="280" height="280"></canvas>
        </div>
        <button onclick="initScanner()" style="margin-top: 20px; padding: 15px 30px; background: var(--neon); border: none; border-radius: 10px; font-weight: bold;">ВОЙТИ</button>
        <button id="reg-btn" class="btn-reg" onclick="registerGuest()">РЕГИСТРАЦИЯ ГОСТЯ</button>
    </div>

    <div id="chat-ui">
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="m-input" placeholder="Сообщение...">
            <button class="btn-send" onclick="sendMsg()">></button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://gwegmxznhlmzejqdpykv.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3ZWdteHpuaGxtemVqcWRweWt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NTYwNjUsImV4cCI6MjA5MTAzMjA2NX0.LZM1GRtqylBxX-d_eze3OmfHsnfRQI4kROZpr_OIWx0';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        let myName = "Serega";
        let audio = new Audio('https://ep256.hostingradio.ru:8052/europaplus256.mp3');

        function toggleRadio() {
            const btn = document.getElementById('radioMain');
            if (audio.paused) {
                audio.play();
                btn.classList.add('active');
            } else {
                audio.pause();
                btn.classList.remove('active');
            }
        }

        function unlockReg() {
            if(prompt("Код:") === "Seregasib") {
                document.getElementById('reg-btn').style.display = 'block';
            }
        }

        async function initScanner() {
            const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
            await Promise.all([faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL), faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL), faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)]);
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('video').srcObject = stream;
            checkFaces();
        }

        async function checkFaces() {
            const { data: users } = await supabaseClient.from('allowed_faces').select('*');
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const displaySize = { width: 280, height: 280 };
            faceapi.matchDimensions(canvas, displaySize);

            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
                const resized = faceapi.resizeResults(detections, displaySize);
                canvas.getContext('2d').clearRect(0, 0, 280, 280);
                if (resized.length > 0) {
                    faceapi.draw.drawFaceLandmarks(canvas, resized);
                    resized.forEach(d => {
                        users?.forEach(u => {
                            if (faceapi.euclideanDistance(d.descriptor, new Float32Array(u.face_descriptor)) < 0.45) {
                                myName = u.name;
                                switchToChat();
                            }
                        });
                    });
                }
            }, 600);
        }

        function switchToChat() {
            const auth = document.getElementById('auth-screen');
            const chat = document.getElementById('chat-ui');
            auth.style.opacity = '0';
            setTimeout(() => {
                auth.style.display = 'none';
                chat.style.display = 'flex';
                setTimeout(() => chat.style.opacity = '1', 50);
                loadMsgs(); listen();
            }, 500);
        }

        async function sendMsg() {
            const i = document.getElementById('m-input');
            if (!i.value) return;
            await supabaseClient.from('messages').insert([{ sender_name: myName, content: i.value }]);
            i.value = '';
        }

        async function loadMsgs() {
            const { data } = await supabaseClient.from('messages').select('*').order('created_at', { ascending: true });
            const b = document.getElementById('messages'); b.innerHTML = '';
            data?.forEach(m => {
                const div = document.createElement('div');
                div.className = 'msg';
                div.innerHTML = `<b>${m.sender_name}:</b><br>${m.content}`;
                
                let t;
                div.addEventListener('touchstart', () => {
                    t = setTimeout(async () => {
                        const op = prompt("1-Все, 2-Я, 0-Нет");
                        if (op === "1") await supabaseClient.from('messages').delete().eq('id', m.id);
                        if (op === "2") div.remove();
                    }, 1000);
                });
                div.addEventListener('touchend', () => clearTimeout(t));
                b.appendChild(div);
            });
            b.scrollTop = b.scrollHeight;
        }

        function listen() {
            supabaseClient.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => loadMsgs()).subscribe();
        }

        async function registerGuest() {
            const name = prompt("Имя:");
            if (!name) return;
            const detect = await faceapi.detectSingleFace(document.getElementById('video')).withFaceLandmarks().withFaceDescriptor();
            if (detect) {
                await supabaseClient.from('allowed_faces').insert([{ name: name, face_descriptor: Array.from(detect.descriptor) }]);
                alert("Ок");
            }
        }
    </script>
</body>
</html>
