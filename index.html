<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sontan System Ultimate</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #05070a; }
        * { transition: all 0.3s ease; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; overflow: hidden; height: 100dvh; }

        /* ЭКРАН ВХОДА */
        #auth-screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); z-index: 9999; }
        .logo-wrap { position: relative; margin-bottom: 30px; cursor: pointer; }
        .logo-text { font-size: 26px; font-weight: bold; color: var(--neon); letter-spacing: 4px; text-shadow: 0 0 10px var(--neon); }
        .bolt { position: absolute; top: -15px; right: -25px; width: 35px; height: 35px; fill: var(--neon); filter: drop-shadow(0 0 5px var(--neon)); }

        .cam-box { width: 250px; height: 250px; border-radius: 50%; border: 3px solid var(--neon); overflow: hidden; box-shadow: 0 0 25px rgba(0, 242, 255, 0.3); }
        video#cam { width: 100%; height: 100%; object-fit: cover; }
        #status { margin-top: 20px; color: var(--neon); font-size: 13px; font-family: monospace; }

        /* РАДИО */
        .radio-btn { 
            position: fixed; top: 15px; right: 15px; z-index: 10001;
            width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--neon); 
            background: rgba(0,0,0,0.8); color: var(--neon); display: flex; align-items: center; 
            justify-content: center; font-size: 9px; font-weight: bold; cursor: pointer; text-align: center;
        }
        .spinning { animation: rotate 5s linear infinite; background: var(--neon) !important; color: black !important; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ЧАТ И СООБЩЕНИЯ */
        #chat-ui { display: none; height: 100dvh; flex-direction: column; }
        #messages { 
            flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; 
            margin-top: 80px; /* Чтобы не перекрывалось радио */
            padding-bottom: 110px; 
        }
        .msg-block { border-left: 3px solid var(--neon); padding: 5px 12px; background: rgba(255,255,255,0.03); border-radius: 0 10px 10px 0; align-self: flex-start; max-width: 90%; }
        .msg-block b { color: var(--neon); font-size: 11px; text-transform: uppercase; display: block; margin-bottom: 4px; }
        .msg-content { font-size: 15px; line-height: 1.4; color: #efefef; }
        .media-file { max-width: 100%; border-radius: 8px; margin-top: 8px; border: 1px solid #222; display: block; }

        /* ИНДИКАТОР ОНЛАЙНА */
        #online { position: fixed; top: 15px; left: 15px; z-index: 1000; font-size: 11px; color: #00ff00; text-shadow: 0 0 5px #00ff00; }

        /* ВВОД */
        .input-area { position: fixed; bottom: 0; width: 100%; padding: 15px; background: rgba(10,12,15,0.95); display: flex; gap: 10px; z-index: 1000; border-top: 1px solid #1a1a1a; }
        .input-text { flex: 1; background: #161b22; border: 1px solid #333; color: white; padding: 12px 18px; border-radius: 25px; outline: none; }
        .input-text:focus { border-color: var(--neon); }
        .btn-send { background: var(--neon); color: black; border: none; width: 45px; height: 45px; border-radius: 50%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        #ctx-menu { display: none; position: fixed; background: #1a1f29; border: 1px solid var(--neon); border-radius: 12px; z-index: 20000; overflow: hidden; }
        .menu-btn { padding: 15px 20px; color: #ff4d4d; font-weight: bold; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

    <div id="online">Online: 1</div>

    <div class="radio-btn" id="radBtn" onclick="toggleRadio()">RAD<br>IO</div>

    <div id="auth-screen">
        <div class="logo-wrap" onclick="admMode()">
            <div class="logo-text">SONTAN SYSTEM</div>
            <svg class="bolt" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        </div>
        <div class="cam-box"><video id="cam" autoplay muted playsinline></video></div>
        <div id="status">Система Face ID активна...</div>
        <button id="reg-btn" style="display:none; margin-top:15px; background:#ff00ff;" class="btn-send" onclick="saveFace()">+</button>
    </div>

    <div id="chat-ui">
        <div id="messages"></div>
        <div class="input-area">
            <button class="btn-send" onclick="document.getElementById('fileIn').click()">+</button>
            <input type="file" id="fileIn" hidden onchange="upload(this)">
            <input type="text" id="mInput" class="input-text" placeholder="Сообщение...">
            <button class="btn-send" onclick="send()">➤</button>
        </div>
    </div>

    <div id="ctx-menu" onclick="this.style.display='none'"><div class="menu-btn" onclick="delMsg()">Удалить у всех</div></div>

    <script>
        const SB_URL = 'https://gwegmxznhlmzejqdpykv.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3ZWdteHpuaGxtemVqcWRweWt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NTYwNjUsImV4cCI6MjA5MTAzMjA2NX0.LZM1GRtqylBxX-d_eze3OmfHsnfRQI4kROZpr_OIWx0';
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        let myName = "Sergey";
        let selId = null;
        let c = 0;
        let radio = new Audio('https://ep256.hostingradio.ru:8052/europaplus256.mp3');

        async function init() {
            const URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
            await Promise.all([
                faceapi.nets.ssdMobilenetv1.loadFromUri(URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(URL)
            ]);

            const s = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('cam').srcObject = s;
            
            const { data: users } = await supabase.from('allowed_faces').select('*');
            
            const scan = setInterval(async () => {
                const d = await faceapi.detectSingleFace(document.getElementById('cam')).withFaceLandmarks().withFaceDescriptor();
                if(d && users) {
                    users.forEach(u => {
                        const dist = faceapi.euclideanDistance(d.descriptor, new Float32Array(u.face_descriptor));
                        if(dist < 0.45) {
                            myName = u.name;
                            clearInterval(scan);
                            startChat();
                        }
                    });
                }
            }, 1000);
        }

        function startChat() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'flex';
            
            const chan = supabase.channel('room1');
            chan.on('postgres_changes', {event:'*', schema:'public', table:'messages'}, loadMsgs)
                .on('presence', {event:'sync'}, () => {
                    document.getElementById('online').innerText = `Online: ${Object.keys(chan.presenceState()).length}`;
                })
                .subscribe(async (s) => {
                    if(s === 'SUBSCRIBED') await chan.track({ user: myName });
                });
            loadMsgs();
        }

        async function loadMsgs() {
            const { data } = await supabase.from('messages').select('*').order('created_at', { ascending: true });
            const box = document.getElementById('messages');
            box.innerHTML = '';
            data?.forEach(m => {
                const d = document.createElement('div');
                d.className = 'msg-block';
                let h = `<b>${m.sender_name}</b>`;
                if(m.media_url) {
                    const isV = m.media_url.toLowerCase().match(/\.(mp4|mov)$/);
                    h += isV ? `<video src="${m.media_url}" class="media-file" controls></video>` : `<img src="${m.media_url}" class="media-file">`;
                }
                if(m.content) h += `<div class="msg-content">${m.content}</div>`;
                d.innerHTML = h;

                let t;
                d.ontouchstart = (e) => t = setTimeout(() => { selId = m.id; showCtx(e); }, 800);
                d.ontouchend = () => clearTimeout(t);
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        }

        async function send() {
            const i = document.getElementById('mInput');
            if(!i.value) return;
            await supabase.from('messages').insert([{ sender_name: myName, content: i.value }]);
            i.value = '';
        }

        async function upload(el) {
            const f = el.files[0];
            const p = Date.now() + "_" + f.name;
            const { data } = await supabase.storage.from('uploads').upload(p, f);
            if(data) {
                const { data: r } = supabase.storage.from('uploads').getPublicUrl(p);
                await supabase.from('messages').insert([{ sender_name: myName, media_url: r.publicUrl, content: "" }]);
            }
        }

        function toggleRadio() {
            const b = document.getElementById('radBtn');
            if (radio.paused) { radio.play(); b.classList.add('spinning'); }
            else { radio.pause(); b.classList.remove('spinning'); }
        }

        function admMode() {
            c++;
            if(c >= 5) {
                if(prompt("Code:") === "Seregasib") document.getElementById('reg-btn').style.display = 'block';
                c = 0;
            }
        }

        async function saveFace() {
            const n = prompt("Имя:");
            const d = await faceapi.detectSingleFace(document.getElementById('cam')).withFaceLandmarks().withFaceDescriptor();
            if(d && n) {
                await supabase.from('allowed_faces').insert([{ name: n, face_descriptor: Array.from(d.descriptor) }]);
                alert("Лицо сохранено!");
            }
        }

        window.onload = init;
        function showCtx(e) {
            const m = document.getElementById('ctx-menu');
            m.style.display = 'block';
            m.style.left = e.touches[0].clientX + 'px';
            m.style.top = e.touches[0].clientY + 'px';
        }
        async function delMsg() { await supabase.from('messages').delete().eq('id', selId); }
    </script>
</body>
</html>
