<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sontan Final Gold</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        :root { --bg: #1c242c; --bar: #242d37; --blue: #0084ff; --bubble: #2b3541; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; height: 100dvh; }

        /* ЭКРАН ВХОДА */
        #auth { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .v-ring { width: 280px; height: 280px; border-radius: 50%; border: 2px solid var(--blue); overflow: hidden; position: relative; box-shadow: 0 0 20px rgba(0,132,255,0.3); }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; inset: 0; }
        #reg-btn { display: none; margin-top: 20px; color: #444; background: none; border: none; font-size: 12px; text-decoration: underline; }

        /* ЧАТ */
        #chat-ui { display: none; flex-direction: column; height: 100dvh; }
        header { background: var(--bar); height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #141a21; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .logo { font-size: 20px; font-weight: bold; cursor: pointer; letter-spacing: 1px; }
        
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 100px; scroll-behavior: smooth; }
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 16px 16px 16px 4px; background: var(--bubble); align-self: flex-start; animation: pop 0.2s ease-out; position: relative; }
        @keyframes pop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .msg b { color: var(--blue); font-size: 11px; display: block; margin-bottom: 3px; }
        .msg img, .msg video { max-width: 100%; border-radius: 10px; margin-top: 5px; }

        /* ГОЛОСОВЫЕ */
        .voice-box { display: flex; align-items: center; gap: 12px; padding: 5px 0; }
        .play-btn { width: 38px; height: 38px; border-radius: 50%; background: var(--blue); border: none; color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* ПАНЕЛЬ ВВОДА */
        .bar { background: var(--bar); padding: 10px 15px 25px; display: flex; align-items: center; gap: 15px; position: fixed; bottom: 0; width: 100%; }
        input[type="text"] { flex: 1; background: #1c242c; border: none; color: white; padding: 12px 18px; border-radius: 25px; font-size: 16px; }
        .icon { background: none; border: none; color: #8a949b; font-size: 26px; cursor: pointer; padding: 0; transition: 0.2s; }
        .icon:active { transform: scale(0.9); }
        .active-rec { color: #ff3b30 !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* RADIO КНОПКА */
        #rad { width: 40px; height: 40px; border: 2px solid var(--blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 7px; font-weight: bold; cursor: pointer; text-align: center; line-height: 9px; }
        @keyframes spin { from {transform:rotate(0deg)} to {transform:rotate(360deg)} }
    </style>
</head>
<body>

    <div id="auth">
        <h1 style="margin-bottom:20px; letter-spacing: 3px;">SONTAN</h1>
        <div class="v-ring">
            <video id="v" autoplay muted playsinline></video>
            <canvas id="c"></canvas>
        </div>
        <button id="go" onclick="startScan()" style="margin-top:40px; padding:15px 70px; border-radius:30px; background:var(--blue); border:none; color:white; font-weight:bold; cursor:pointer; font-size:16px;">ВОЙТИ</button>
        <button id="reg-btn" onclick="register()">Registration</button>
    </div>

    <div id="chat-ui">
        <header>
            <div class="logo" onclick="secretTrigger()">Sontan</div>
            <div style="font-size:11px; color:#8a949b;"><span style="color:#4cd964">●</span> Online: <span id="count">0</span></div>
            <div id="rad" onclick="toggleRad()">EUROPA<br>PLUS</div>
        </header>

        <div id="msgs"></div>

        <div class="bar">
            <button class="icon" onclick="document.getElementById('file').click()">+</button>
            <input type="file" id="file" hidden onchange="window.pendingFile = this.files[0]; alert('Файл готов');">
            <input type="text" id="text" placeholder="Сообщение">
            <button class="icon" id="mic" onclick="toggleMic()">🎤</button>
            <button class="icon" style="color:var(--blue);" onclick="send()">➤</button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://gwegmxznhlmzejqdpykv.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3ZWdteHpuaGxtemVqcWRweWt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NTYwNjUsImV4cCI6MjA5MTAzMjA2NX0.LZM1GRtqylBxX-d_eze3OmfHsnfRQI4kROZpr_OIWx0';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        let myName = localStorage.getItem('s_name') || "Serega";
        let radio = new Audio('https://ep256.hostingradio.ru:8052/europaplus256.mp3');
        let rec, chunks = [], isRec = false, secretClicks = 0;

        // Функция секретки
        function secretTrigger() { 
            secretClicks++; 
            if(secretClicks >= 5) { 
                if(prompt("Введите пароль доступа:") === "Seregasib") {
                    document.getElementById('reg-btn').style.display='block'; 
                    alert("Секретка активирована: кнопка Registration появилась на главном экране");
                }
                secretClicks = 0; 
            } 
        }

        function toggleRad() {
            const b = document.getElementById('rad');
            if(radio.paused) { radio.play(); b.style.animation = "spin 4s linear infinite"; b.style.background = "var(--blue)"; b.style.color = "white"; }
            else { radio.pause(); b.style.animation = ""; b.style.background = "none"; b.style.color = "var(--blue)"; }
        }

        async function startScan() {
            const btn = document.getElementById('go');
            btn.innerText = "ЗАГРУЗКА...";
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('v').srcObject = stream;
            
            const M = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
            await Promise.all([faceapi.nets.ssdMobilenetv1.loadFromUri(M), faceapi.nets.faceLandmark68Net.loadFromUri(M), faceapi.nets.faceRecognitionNet.loadFromUri(M)]);
            
            const { data: users } = await sb.from('allowed_faces').select('*');
            
            const loop = setInterval(async () => {
                const dec = await faceapi.detectSingleFace('v').withFaceLandmarks().withFaceDescriptor();
                if(dec) {
                    const canvas = document.getElementById('c');
                    faceapi.matchDimensions(canvas, {width:280, height:280});
                    faceapi.draw.drawFaceLandmarks(canvas, faceapi.resizeResults(dec, {width:280, height:280}));
                    
                    for (let u of users) {
                        if(faceapi.euclideanDistance(dec.descriptor, new Float32Array(u.face_descriptor)) < 0.45) {
                            myName = u.name; localStorage.setItem('s_name', myName);
                            clearInterval(loop); stream.getTracks().forEach(t => t.stop());
                            document.getElementById('auth').style.display = 'none';
                            document.getElementById('chat-ui').style.display = 'flex';
                            initChat();
                            break;
                        }
                    }
                }
            }, 600);
        }

        function initChat() {
            load();
            sb.channel('db').on('postgres_changes', {event:'*', schema:'public', table:'messages'}, load).subscribe();
            const p = sb.channel('on').on('presence', {event:'sync'}, () => {
                document.getElementById('count').innerText = Object.keys(p.presenceState()).length;
            }).subscribe(async (s) => { if(s==='SUBSCRIBED') await p.track({u:myName}); });
        }

        async function load() {
            const { data } = await sb.from('messages').select('*').order('created_at', { ascending: true });
            const box = document.getElementById('msgs'); box.innerHTML = '';
            data?.forEach(m => {
                const d = document.createElement('div'); d.className = 'msg';
                let h = `<b>${m.sender_name}</b>`;
                if(m.media_url) {
                    if(m.media_url.includes('.webm')) h += `<div class="voice-box"><button class="play-btn" onclick="new Audio('${m.media_url}').play()">▶</button><div style="width:100px; height:2px; background:#444; border-radius:2px;"></div></div>`;
                    else if(m.media_url.includes('.mp4')) h += `<video src="${m.media_url}" controls></video>`;
                    else h += `<img src="${m.media_url}" onclick="window.open('${m.media_url}')">`;
                }
                if(m.content) h += `<div>${m.content}</div>`;
                d.innerHTML = h;
                d.onclick = () => { if(confirm("Удалить это сообщение?")) sb.from('messages').delete().eq('id', m.id); };
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        }

        async function toggleMic() {
            const btn = document.getElementById('mic');
            if(!isRec) {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                rec = new MediaRecorder(s); chunks = [];
                rec.ondataavailable = e => chunks.push(e.data);
                rec.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    await uploadFile(new File([blob], "voice.webm"), "");
                };
                rec.start(); isRec = true; btn.classList.add('active-rec');
            } else {
                rec.stop(); isRec = false; btn.classList.remove('active-rec');
            }
        }

        async function send() {
            const i = document.getElementById('text'); const txt = i.value.trim();
            const f = window.pendingFile; if(!txt && !f) return;
            i.value = ''; await uploadFile(f, txt); window.pendingFile = null;
        }

        async function uploadFile(f, t) {
            let url = null;
            if(f) {
                const path = Date.now() + "_" + (f.name || "file");
                await sb.storage.from('uploads').upload(path, f);
                url = sb.storage.from('uploads').getPublicUrl(path).data.publicUrl;
            }
            await sb.from('messages').insert([{ sender_name: myName, content: t, media_url: url }]);
        }

        async function register() {
            const n = prompt("Введите имя нового пользователя:");
            const d = await faceapi.detectSingleFace('v').withFaceLandmarks().withFaceDescriptor();
            if(d && n) {
                const { error } = await sb.from('allowed_faces').insert([{ name: n, face_descriptor: Array.from(d.descriptor) }]);
                if(!error) alert("Пользователь " + n + " успешно добавлен!");
            } else {
                alert("Лицо не обнаружено, попробуйте еще раз.");
            }
        }
    </script>
</body>
</html>
