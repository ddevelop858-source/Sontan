<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sontan System Biometry</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #05070a; --msg-bg: #1a1f29; }
        * { transition: all 0.2s ease; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow: hidden; height: 100dvh; }

        /* ИНДИКАТОРЫ */
        #top-bar { position: fixed; top: 10px; left: 15px; z-index: 1000; font-size: 11px; color: var(--neon); }

        /* МАЛЕНЬКОЕ РАДИО */
        .radio-btn { 
            position: fixed; top: 15px; right: 15px; z-index: 10001;
            width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--neon); 
            background: rgba(0,0,0,0.8); color: var(--neon); display: flex; align-items: center; 
            justify-content: center; font-size: 8px; font-weight: bold; cursor: pointer;
        }
        .spinning { animation: rotate 5s linear infinite; background: var(--neon) !important; color: black !important; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ЭКРАН ВХОДА С FACE ID */
        #auth-screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); z-index: 9999; }
        .logo { font-size: 22px; font-weight: bold; color: var(--neon); margin-bottom: 25px; cursor: pointer; }
        .v-container { width: 240px; height: 240px; border-radius: 50%; border: 3px solid var(--neon); overflow: hidden; position: relative; box-shadow: 0 0 20px var(--neon); }
        video#cam { width: 100%; height: 100%; object-fit: cover; }
        #status-txt { margin-top: 20px; font-size: 13px; color: var(--neon); text-align: center; }

        /* ДИАЛОГИ (КАК В МЕССЕНДЖЕРАХ) */
        #chat-ui { display: none; height: 100dvh; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; margin-top: 70px; padding-bottom: 110px; }
        
        .bubble { 
            background: var(--msg-bg); padding: 10px 15px; border-radius: 18px; 
            max-width: 80%; align-self: flex-start; border-bottom-left-radius: 2px;
            border: 1px solid rgba(0, 242, 255, 0.1);
        }
        .bubble.me { align-self: flex-end; border-bottom-left-radius: 18px; border-bottom-right-radius: 2px; border-right: 3px solid var(--neon); background: #1c222d; }
        
        .name { font-size: 10px; color: var(--neon); font-weight: bold; margin-bottom: 3px; display: block; }
        .media { width: 100%; border-radius: 10px; margin-top: 5px; display: block; border: 1px solid #333; }
        
        /* ВВОД */
        .input-bar { position: fixed; bottom: 0; width: 100%; padding: 15px; background: rgba(13,17,23,0.95); display: flex; gap: 10px; z-index: 1000; }
        .field { flex: 1; background: #161b22; border: 1px solid #333; color: white; padding: 12px; border-radius: 20px; outline: none; }
        .btn { background: var(--neon); color: black; border: none; width: 45px; height: 45px; border-radius: 50%; font-weight: bold; }
    </style>
</head>
<body>

    <div id="top-bar">Online: <span id="online-val">1</span></div>
    <div class="radio-btn" id="radio" onclick="toggleRadio()">RAD<br>IO</div>

    <div id="auth-screen">
        <div class="logo" onclick="adminAccess()">SONTAN SYSTEM</div>
        <div class="v-container"><video id="cam" autoplay muted playsinline></video></div>
        <div id="status-txt">Инициализация биометрии...</div>
        <button id="reg-btn" style="display:none; margin-top:10px; background:#ff00ff;" class="btn" onclick="registerFace()">+</button>
    </div>

    <div id="chat-ui">
        <div id="messages"></div>
        <div class="input-bar">
            <button class="btn" onclick="document.getElementById('f').click()">+</button>
            <input type="file" id="f" hidden onchange="upload(this)">
            <input type="text" id="minput" class="field" placeholder="Сообщение...">
            <button class="btn" onclick="send()">➤</button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://gwegmxznhlmzejqdpykv.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3ZWdteHpuaGxtemVqcWRweWt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NTYwNjUsImV4cCI6MjA5MTAzMjA2NX0.LZM1GRtqylBxX-d_eze3OmfHsnfRQI4kROZpr_OIWx0';
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        let myName = "Serega";
        let clicks = 0;
        let player = new Audio('https://ep256.hostingradio.ru:8052/europaplus256.mp3');

        // РАБОТА С FACE ID
        async function initFaceID() {
            const status = document.getElementById('status-txt');
            const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
            
            await Promise.all([
                faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
            ]);

            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('cam').srcObject = stream;
            status.innerText = "Сканирование лица...";

            const { data: users } = await supabase.from('allowed_faces').select('*');

            const scan = setInterval(async () => {
                const detect = await faceapi.detectSingleFace(document.getElementById('cam')).withFaceLandmarks().withFaceDescriptor();
                if(detect && users) {
                    for(let u of users) {
                        const dist = faceapi.euclideanDistance(detect.descriptor, new Float32Array(u.face_descriptor));
                        if(dist < 0.5) {
                            myName = u.name;
                            clearInterval(scan);
                            status.innerText = "Доступ разрешен: " + myName;
                            setTimeout(enter, 1000);
                        }
                    }
                }
            }, 1000);
        }

        async function registerFace() {
            const name = prompt("Имя для запоминания:");
            const detect = await faceapi.detectSingleFace(document.getElementById('cam')).withFaceLandmarks().withFaceDescriptor();
            if(detect && name) {
                await supabase.from('allowed_faces').insert([{ name: name, face_descriptor: Array.from(detect.descriptor) }]);
                alert("Лицо " + name + " сохранено навсегда!");
            }
        }

        function enter() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'flex';
            load();
            supabase.channel('room').on('postgres_changes', {event:'*', schema:'public', table:'messages'}, load).subscribe();
        }

        async function load() {
            const { data } = await supabase.from('messages').select('*').order('created_at', { ascending: true });
            const box = document.getElementById('messages');
            box.innerHTML = '';
            data?.forEach(m => {
                const isMe = m.sender_name === myName;
                const d = document.createElement('div');
                d.className = `bubble ${isMe ? 'me' : ''}`;
                
                let html = `<span class="name">${m.sender_name}</span>`;
                if(m.media_url) {
                    const isVid = m.media_url.toLowerCase().match(/\.(mp4|mov)$/);
                    html += isVid ? `<video src="${m.media_url}" class="media" controls></video>` : `<img src="${m.media_url}" class="media">`;
                }
                if(m.content) html += `<div>${m.content}</div>`;
                
                d.innerHTML = html;
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        }

        async function send() {
            const i = document.getElementById('minput');
            if(!i.value) return;
            await supabase.from('messages').insert([{ sender_name: myName, content: i.value }]);
            i.value = '';
        }

        async function upload(el) {
            const f = el.files[0];
            const path = Date.now() + "_" + f.name;
            const { data } = await supabase.storage.from('uploads').upload(path, f);
            if(data) {
                const { data: res } = supabase.storage.from('uploads').getPublicUrl(path);
                await supabase.from('messages').insert([{ sender_name: myName, media_url: res.publicUrl, content: "" }]);
            }
        }

        function toggleRadio() {
            const b = document.getElementById('radio');
            if (player.paused) { player.play(); b.classList.add('spinning'); }
            else { player.pause(); b.classList.remove('spinning'); }
        }

        function adminAccess() {
            clicks++;
            if(clicks >= 5) {
                if(prompt("Code:") === "Seregasib") document.getElementById('reg-btn').style.display = 'block';
                clicks = 0;
            }
        }

        window.onload = initFaceID;
    </script>
</body>
</html>
