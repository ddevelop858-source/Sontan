<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sontan Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        :root { --bg: #1c242c; --bar: #242d37; --blue: #0084ff; --bubble: #2b3541; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; height: 100dvh; }

        /* Шапка */
        header { background: var(--bar); height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #141a21; z-index: 100; position: fixed; top: 0; width: 100%; }
        .logo { font-size: 20px; font-weight: bold; color: white; cursor: pointer; }
        .info { font-size: 11px; color: #8a949b; display: flex; align-items: center; gap: 5px; }
        .dot { width: 7px; height: 7px; background: #4cd964; border-radius: 50%; }

        /* Радио */
        .rad-circle { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--blue); background: #000; color: var(--blue); display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; cursor: pointer; }
        .spin { animation: rotate 4s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Вход Face ID */
        #auth { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .v-ring { width: 280px; height: 280px; border-radius: 50%; border: 2px solid var(--blue); overflow: hidden; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; inset: 0; }

        /* Чат */
        #chat-ui { display: none; padding-top: 65px; height: 100dvh; flex-direction: column; }
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 90px; }
        .m-box { max-width: 80%; padding: 10px 14px; border-radius: 16px 16px 16px 4px; background: var(--bubble); align-self: flex-start; position: relative; }
        .m-box b { color: var(--blue); font-size: 11px; display: block; margin-bottom: 3px; }
        .m-box img, .m-box video { max-width: 100%; border-radius: 10px; margin-top: 5px; }

        /* Плеер */
        .v-row { display: flex; align-items: center; gap: 10px; padding: 5px 0; }
        .play { width: 35px; height: 35px; border-radius: 50%; background: var(--blue); border: none; color: white; cursor: pointer; }

        /* Ввод */
        .bar { background: var(--bar); padding: 10px 15px 25px; position: fixed; bottom: 0; width: 100%; display: flex; align-items: center; gap: 12px; }
        input[type="text"] { flex: 1; background: #1c242c; border: none; color: white; padding: 12px 18px; border-radius: 25px; outline: none; }
        .btn { background: none; border: none; color: #8a949b; font-size: 24px; cursor: pointer; }
        .send-btn { color: var(--blue) !important; }
        .rec-on { color: #ff3b30 !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        #reg-btn { display: none; margin-top: 20px; color: #555; background: none; border: none; font-size: 12px; }
    </style>
</head>
<body>

    <div id="auth">
        <h2 style="margin-bottom:20px;">Sontan</h2>
        <div class="v-ring">
            <video id="v" autoplay muted playsinline></video>
            <canvas id="c"></canvas>
        </div>
        <button id="go" onclick="initFace()" style="margin-top:40px; padding:15px 50px; border-radius:30px; background:var(--blue); border:none; color:white; font-weight:bold;">ВОЙТИ</button>
        <button id="reg-btn" onclick="register()">Registration</button>
    </div>

    <div id="chat-ui">
        <header>
            <div class="logo" onclick="tapLogo()">Sontan</div>
            <div class="info"><span class="dot"></span>Online: <span id="online">0</span></div>
            <div class="rad-circle" id="rad" onclick="toggleRad()">EUROPA<br>PLUS</div>
        </header>

        <div id="msgs"></div>

        <div class="bar">
            <button class="btn" onclick="document.getElementById('f').click()">+</button>
            <input type="file" id="f" hidden onchange="window.file = this.files[0]">
            <input type="text" id="t" placeholder="Сообщение">
            <button class="btn" id="mic" onclick="doMic()">🎤</button>
            <button class="btn send-btn" onclick="send()">➤</button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://gwegmxznhlmzejqdpykv.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3ZWdteHpuaGxtemVqcWRweWt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NTYwNjUsImV4cCI6MjA5MTAzMjA2NX0.LZM1GRtqylBxX-d_eze3OmfHsnfRQI4kROZpr_OIWx0';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        let myName = localStorage.getItem('s_name') || "Serega";
        let radio = new Audio('https://ep256.hostingradio.ru:8052/europaplus256.mp3');
        let rec, chunks = [], isRec = false, clicks = 0;

        function tapLogo() { clicks++; if(clicks >= 5) { if(prompt("Pass:") === "Seregasib") document.getElementById('reg-btn').style.display='block'; clicks=0; } }

        function toggleRad() {
            const b = document.getElementById('rad');
            if(radio.paused) { radio.play(); b.classList.add('spin'); }
            else { radio.pause(); b.classList.remove('spin'); }
        }

        async function initFace() {
            document.getElementById('go').innerText = "АНАЛИЗ...";
            const s = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('v').srcObject = s;
            const M = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
            await Promise.all([faceapi.nets.ssdMobilenetv1.loadFromUri(M), faceapi.nets.faceLandmark68Net.loadFromUri(M), faceapi.nets.faceRecognitionNet.loadFromUri(M)]);
            
            const { data: users } = await sb.from('allowed_faces').select('*');
            const loop = setInterval(async () => {
                const dec = await faceapi.detectSingleFace('v').withFaceLandmarks().withFaceDescriptor();
                if(dec) {
                    const canvas = document.getElementById('c');
                    faceapi.matchDimensions(canvas, {width:280, height:280});
                    faceapi.draw.drawFaceLandmarks(canvas, faceapi.resizeResults(dec, {width:280, height:280}));
                    users.forEach(u => {
                        if(faceapi.euclideanDistance(dec.descriptor, new Float32Array(u.face_descriptor)) < 0.45) {
                            myName = u.name; localStorage.setItem('s_name', myName);
                            clearInterval(loop); s.getTracks().forEach(t => t.stop());
                            document.getElementById('auth').style.display = 'none';
                            document.getElementById('chat-ui').style.display = 'flex';
                            start();
                        }
                    });
                }
            }, 600);
        }

        function start() {
            load();
            sb.channel('m').on('postgres_changes', {event:'*', schema:'public', table:'messages'}, load).subscribe();
            const p = sb.channel('p').on('presence', {event:'sync'}, () => {
                document.getElementById('online').innerText = Object.keys(p.presenceState()).length;
            }).subscribe(async (s) => { if(s==='SUBSCRIBED') await p.track({u:myName}); });
        }

        async function load() {
            const { data } = await sb.from('messages').select('*').order('created_at', { ascending: true });
            const box = document.getElementById('msgs'); box.innerHTML = '';
            data?.forEach(m => {
                const d = document.createElement('div'); d.className = 'm-box';
                let h = `<b>${m.sender_name}</b>`;
                if(m.media_url) {
                    if(m.media_url.includes('.webm')) h += `<div class="v-row"><button class="play" onclick="new Audio('${m.media_url}').play()">▶</button><div style="width:100px; height:2px; background:#444;"></div></div>`;
                    else if(m.media_url.includes('.mp4')) h += `<video src="${m.media_url}" controls></video>`;
                    else h += `<img src="${m.media_url}" onclick="window.open('${m.media_url}')">`;
                }
                if(m.content) h += `<div>${m.content}</div>`;
                d.innerHTML = h;
                d.onclick = () => { if(confirm("Удалить?")) sb.from('messages').delete().eq('id', m.id); };
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        }

        async function doMic() {
            const b = document.getElementById('mic');
            if(!isRec) {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                rec = new MediaRecorder(s); chunks = [];
                rec.ondataavailable = e => chunks.push(e.data);
                rec.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    await up(new File([blob], "v.webm"), "");
                };
                rec.start(); isRec = true; b.classList.add('rec-on');
            } else { rec.stop(); isRec = false; b.classList.remove('rec-on'); }
        }

        async function send() {
            const i = document.getElementById('t'); const txt = i.value.trim();
            const f = window.file; if(!txt && !f) return;
            i.value = ''; await up(f, txt); window.file = null;
        }

        async function up(f, t) {
            let url = null;
            if(f) {
                const path = Date.now() + "_f";
                await sb.storage.from('uploads').upload(path, f);
                url = sb.storage.from('uploads').getPublicUrl(path).data.publicUrl;
            }
            await sb.from('messages').insert([{ sender_name: myName, content: t, media_url: url }]);
        }

        async function register() {
            const n = prompt("Name:");
            const d = await faceapi.detectSingleFace('v').withFaceLandmarks().withFaceDescriptor();
            if(d && n) await sb.from('allowed_faces').insert([{ name: n, face_descriptor: Array.from(d.descriptor) }]);
        }
    </script>
</body>
</html>
