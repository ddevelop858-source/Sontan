<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sontan System Final</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --pink: #ff00ff; --bg: #05070a; }
        * { transition: all 0.3s ease; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow: hidden; height: 100dvh; }

        /* КНОПКА РАДИО И ВРАЩЕНИЕ */
        .radio-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; align-items: center; }
        .radio-btn { 
            width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--neon); 
            background: rgba(0,0,0,0.8); color: var(--neon); display: flex; align-items: center; 
            justify-content: center; font-size: 10px; font-weight: bold; cursor: pointer; text-align: center;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }
        .spinning { animation: rotate 4s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .active-btn { background: var(--neon) !important; color: black !important; box-shadow: 0 0 30px var(--neon) !important; }

        #lightning-visualizer { width: 50px; height: 80px; opacity: 0; margin-top: 5px; pointer-events: none; }

        /* ЭКРАН ВХОДА */
        #auth-screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); z-index: 100; opacity: 1; }
        .v-container { position: relative; width: 260px; height: 260px; border-radius: 50%; overflow: hidden; border: 3px solid var(--neon); box-shadow: 0 0 20px var(--neon); }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; }

        /* ИНТЕРФЕЙС ЧАТА */
        #chat-ui { display: none; height: 100dvh; flex-direction: column; opacity: 0; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 100px; }
        .msg { background: #1a1f29; padding: 12px; border-radius: 15px; max-width: 85%; border-left: 4px solid var(--neon); align-self: flex-start; position: relative; }
        .msg b { color: var(--neon); font-size: 12px; display: block; margin-bottom: 4px; }
        .msg-media { max-width: 100%; border-radius: 10px; margin-top: 8px; display: block; }

        /* ПОЛЕ ВВОДА */
        .input-area { position: fixed; bottom: 0; width: 100%; padding: 15px; background: #161b22; display: flex; gap: 10px; align-items: center; border-top: 1px solid #333; }
        input[type="text"] { flex: 1; background: #0d1117; border: 1px solid var(--neon); color: white; padding: 12px; border-radius: 10px; outline: none; }
        .btn-action { background: var(--neon); color: black; border: none; padding: 12px 18px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-pink { background: var(--pink); color: white; display: none; margin-top: 15px; padding: 12px 25px; border-radius: 10px; border: none; font-weight: bold; }

        /* МЕНЮ УДАЛЕНИЯ */
        #context-menu { display: none; position: fixed; background: #222; border: 1px solid var(--neon); border-radius: 12px; z-index: 10000; overflow: hidden; min-width: 150px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .menu-item { padding: 12px 15px; cursor: pointer; font-size: 14px; border-bottom: 1px solid #333; }
        .menu-item:last-child { border-bottom: none; }
        .menu-item:active { background: #333; }
    </style>
</head>
<body>

    <div class="radio-container">
        <div class="radio-btn" id="radioMain" onclick="toggleRadio()">
            <div id="radioInner">EUROPA<br>PLUS</div>
        </div>
        <svg id="lightning-visualizer" viewBox="0 0 50 100">
            <path id="bolt" d="M25,0 L35,30 L15,40 L40,70 L10,80 L30,100" stroke="#00f2ff" fill="none" stroke-width="2"/>
        </svg>
    </div>

    <div id="auth-screen">
        <div id="logo" style="color:var(--neon); font-size: 24px; font-weight: bold; margin-bottom: 20px; letter-spacing: 3px;" ondblclick="unlockAdmin()">SONTAN SYSTEM</div>
        <div class="v-container">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="canvas" width="260" height="260"></canvas>
        </div>
        <button class="btn-action" style="margin-top: 25px;" onclick="initSecurity()">АКТИВИРОВАТЬ ВХОД</button>
        <button id="reg-btn" class="btn-pink" onclick="registerNewUser()">РЕГИСТРАЦИЯ ЛИЦА</button>
    </div>

    <div id="chat-ui">
        <div id="messages"></div>
        <div class="input-area">
            <button class="btn-action" onclick="document.getElementById('file-input').click()">+</button>
            <input type="file" id="file-input" hidden accept="image/*,video/*" onchange="uploadAndSend(this)">
            <input type="text" id="m-input" placeholder="Введите сообщение...">
            <button class="btn-action" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <div id="context-menu">
        <div class="menu-item" style="color: #ff4444;" onclick="deleteForAll()">Удалить у всех</div>
        <div class="menu-item" onclick="closeMenu()">Отмена</div>
    </div>

    <script>
        const SB_URL = 'https://gwegmxznhlmzejqdpykv.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3ZWdteHpuaGxtemVqcWRweWt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NTYwNjUsImV4cCI6MjA5MTAzMjA2NX0.LZM1GRtqylBxX-d_eze3OmfHsnfRQI4kROZpr_OIWx0';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let myName = "Serega";
        let currentTargetMsg = null;
        let audio = new Audio('https://ep256.hostingradio.ru:8052/europaplus256.mp3');

        // --- ФУНКЦИИ РАДИО ---
        function toggleRadio() {
            const inner = document.getElementById('radioInner');
            const bolt = document.getElementById('lightning-visualizer');
            const btn = document.getElementById('radioMain');
            if (audio.paused) {
                audio.play();
                inner.classList.add('spinning');
                btn.classList.add('active-btn');
                bolt.style.opacity = '1';
                animateBolt();
            } else {
                audio.pause();
                inner.classList.remove('spinning');
                btn.classList.remove('active-btn');
                bolt.style.opacity = '0';
            }
        }

        function animateBolt() {
            if(audio.paused) return;
            const path = document.getElementById('bolt');
            const shift = () => (Math.random() - 0.5) * 15;
            path.setAttribute('d', `M25,0 L${35+shift()},30 L${15+shift()},40 L${40+shift()},70 L${10+shift()},80 L30,100`);
            setTimeout(animateBolt, 80);
        }

        // --- БЕЗОПАСНОСТЬ И ВХОД ---
        function unlockAdmin() {
            if(prompt("Пароль системы:") === "Seregasib") {
                document.getElementById('reg-btn').style.display = 'block';
            }
        }

        async function initSecurity() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('video').srcObject = stream;
                
                const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
                await Promise.all([
                    faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);
                startFaceScanning();
            } catch(e) {
                alert("Ошибка доступа к камере или моделям.");
            }
        }

        async function startFaceScanning() {
            const video = document.getElementById('video');
            const { data: users } = await supabaseClient.from('allowed_faces').select('*');
            
            const scanInterval = setInterval(async () => {
                const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
                if (detection && users) {
                    for (let u of users) {
                        const dist = faceapi.euclideanDistance(detection.descriptor, new Float32Array(u.face_descriptor));
                        if (dist < 0.45) {
                            myName = u.name;
                            clearInterval(scanInterval);
                            enterChat();
                        }
                    }
                }
            }, 800);
        }

        async function registerNewUser() {
            const name = prompt("Имя нового пользователя:");
            if(!name) return;
            const video = document.getElementById('video');
            const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
            if(detection) {
                await supabaseClient.from('allowed_faces').insert([{ name: name, face_descriptor: Array.from(detection.descriptor) }]);
                alert("Лицо сохранено в базу.");
            }
        }

        function enterChat() {
            document.getElementById('auth-screen').style.display = 'none';
            const chat = document.getElementById('chat-ui');
            chat.style.display = 'flex';
            setTimeout(() => chat.style.opacity = '1', 50);
            loadHistory();
            subscribeToUpdates();
        }

        // --- РАБОТА С СООБЩЕНИЯМИ ---
        async function loadHistory() {
            const { data } = await supabaseClient.from('messages').select('*').order('created_at', { ascending: true });
            const box = document.getElementById('messages');
            box.innerHTML = '';
            data?.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'msg';
                let content = `<b>${msg.sender_name}</b>`;
                if(msg.media_url) content += `<img src="${msg.media_url}" class="msg-media">`;
                if(msg.content) content += `<div>${msg.content}</div>`;
                div.innerHTML = content;
                
                // Долгое нажатие для меню
                let timer;
                div.onmousedown = div.ontouchstart = (e) => {
                    timer = setTimeout(() => openMenu(e, msg.id), 800);
                };
                div.onmouseup = div.ontouchend = () => clearTimeout(timer);

                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('m-input');
            if(!input.value) return;
            await supabaseClient.from('messages').insert([{ sender_name: myName, content: input.value }]);
            input.value = '';
        }

        async function uploadAndSend(input) {
            const file = input.files[0];
            if(!file) return;
            const fileName = Date.now() + "_" + file.name;
            const { data, error } = await supabaseClient.storage.from('uploads').upload(fileName, file);
            if(data) {
                const { data: link } = supabaseClient.storage.from('uploads').getPublicUrl(fileName);
                await supabaseClient.from('messages').insert([{ sender_name: myName, media_url: link.publicUrl, content: "" }]);
            }
        }

        function subscribeToUpdates() {
            supabaseClient.channel('realtime_msgs').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => {
                loadHistory();
            }).subscribe();
        }

        // --- МЕНЮ УДАЛЕНИЯ ---
        function openMenu(e, id) {
            currentTargetMsg = id;
            const menu = document.getElementById('context-menu');
            const x = e.clientX || e.touches[0].clientX;
            const y = e.clientY || e.touches[0].clientY;
            menu.style.display = 'block';
            menu.style.left = x + 'px';
            menu.style.top = y + 'px';
        }

        function closeMenu() { document.getElementById('context-menu').style.display = 'none'; }

        async function deleteForAll() {
            if(currentTargetMsg) {
                await supabaseClient.from('messages').delete().eq('id', currentTargetMsg);
                closeMenu();
            }
        }
    </script>
</body>
</html>
