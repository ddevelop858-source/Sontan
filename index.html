<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sontan Final Control</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        :root { --bg: #1c242c; --bar: #242d37; --blue: #0084ff; --bubble: #2b3541; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; height: 100dvh; overflow: hidden; }

        /* Вход */
        #auth { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .v-ring { width: 240px; height: 240px; border-radius: 50%; border: 3px solid var(--blue); overflow: hidden; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #reg-btn { display: none; margin-top: 20px; color: #555; border: 1px solid #333; padding: 8px 15px; border-radius: 10px; background: none; font-size: 12px; }

        /* Чат */
        #chat-ui { display: none; flex-direction: column; height: 100dvh; }
        header { background: var(--bar); height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #141a21; z-index: 10; }
        .logo { font-size: 20px; font-weight: bold; cursor: pointer; user-select: none; }

        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 130px; }
        .msg { max-width: 85%; padding: 10px; border-radius: 16px 16px 16px 4px; background: var(--bubble); align-self: flex-start; }
        .msg b { color: var(--blue); font-size: 11px; display: block; margin-bottom: 4px; }
        .msg img, .msg video { max-width: 100%; border-radius: 10px; margin-top: 5px; display: block; }

        /* Голосовой плеер */
        .v-box { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 12px; margin-top: 5px; }
        .p-btn { width: 34px; height: 34px; border-radius: 50%; background: var(--blue); border: none; color: white; cursor: pointer; }

        /* Нижняя панель с превью */
        .bar-wrap { position: fixed; bottom: 0; width: 100%; background: var(--bar); z-index: 100; border-top: 1px solid #141a21; padding-bottom: env(safe-area-inset-bottom, 20px); }
        #preview { display: none; padding: 10px 15px; background: #2a343e; align-items: center; gap: 10px; border-bottom: 1px solid #141a21; }
        #preview img { width: 40px; height: 40px; border-radius: 5px; object-fit: cover; }
        
        .bar { padding: 10px 15px; display: flex; align-items: center; gap: 10px; }
        .bar input[type="text"] { flex: 1; background: #1c242c; border: none; color: white; padding: 12px 18px; border-radius: 25px; font-size: 16px; }
        .btn-ui { background: none; border: none; color: #8a949b; font-size: 24px; cursor: pointer; display: flex; align-items: center; }
        .rec-active { color: #ff3b30 !important; }

        #rad { width: 38px; height: 38px; border: 2px solid var(--blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 7px; text-align: center; color: var(--blue); cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth">
        <h1 style="letter-spacing: 5px; margin-bottom: 20px;">SONTAN</h1>
        <div class="v-ring"><video id="v" autoplay muted playsinline></video></div>
        <button id="go" onclick="startBio()" style="margin-top:40px; padding:15px 60px; border-radius:30px; background:var(--blue); border:none; color:white; font-weight:bold;">ВОЙТИ</button>
        <button id="reg-btn" onclick="register()">REGISTRATION</button>
    </div>

    <div id="chat-ui">
        <header>
            <div class="logo" id="logo">Sontan</div>
            <div id="rad" onclick="toggleRad()">EUROPA<br>PLUS</div>
        </header>
        
        <div id="msgs"></div>

        <div class="bar-wrap">
            <div id="preview">
                <div id="prev-content" style="font-size: 12px; color: var(--blue);"></div>
                <button onclick="cancelFile()" style="margin-left:auto; background:none; border:none; color:#ff3b30;">Отмена</button>
            </div>
            <div class="bar">
                <button class="btn-ui" onclick="document.getElementById('file').click()">📎</button>
                <input type="file" id="file" hidden onchange="handleFileSelect(this)">
                <input type="text" id="text" placeholder="Cообщение">
                <button class="btn-ui" id="mic" onclick="handleMic()">🎤</button>
                <button class="btn-ui" style="color:var(--blue);" onclick="send()">➤</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://gwegmxznhlmzejqdpykv.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3ZWdteHpuaGxtemVqcWRweWt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NTYwNjUsImV4cCI6MjA5MTAzMjA2NX0.LZM1GRtqylBxX-d_eze3OmfHsnfRQI4kROZpr_OIWx0';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        let myName = localStorage.getItem('s_name') || "Serega";
        let radio = new Audio('https://ep256.hostingradio.ru:8052/europaplus256.mp3');
        let currentAudio = null, rec, chunks = [], isRec = false, pressTimer, pendingFile = null;

        // Секретка (удержание 2 сек)
        const logo = document.getElementById('logo');
        logo.onmousedown = logo.ontouchstart = () => { pressTimer = setTimeout(() => { if(prompt("Pass:") === "Seregasib") document.getElementById('reg-btn').style.display='block'; }, 2000); };
        logo.onmouseup = logo.ontouchend = () => clearTimeout(pressTimer);

        function handleFileSelect(input) {
            if(input.files[0]) {
                pendingFile = input.files[0];
                const pre = document.getElementById('preview');
                const cont = document.getElementById('prev-content');
                pre.style.display = 'flex';
                cont.innerHTML = pendingFile.type.includes('image') ? `<img src="${URL.createObjectURL(pendingFile)}"> Фото готово` : `📎 Файл: ${pendingFile.name}`;
            }
        }

        function cancelFile() {
            pendingFile = null;
            document.getElementById('preview').style.display = 'none';
            document.getElementById('file').value = '';
        }

        function playVoice(url) {
            if (currentAudio) currentAudio.pause();
            if (!radio.paused) radio.pause();
            currentAudio = new Audio(url);
            currentAudio.play();
        }

        function toggleRad() {
            if (!radio.paused) radio.pause();
            else { if(currentAudio) currentAudio.pause(); radio.play(); }
        }

        async function startBio() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('v').srcObject = stream;
            const M = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
            await Promise.all([faceapi.nets.ssdMobilenetv1.loadFromUri(M), faceapi.nets.faceLandmark68Net.loadFromUri(M), faceapi.nets.faceRecognitionNet.loadFromUri(M)]);
            const { data: users } = await sb.from('allowed_faces').select('*');
            const loop = setInterval(async () => {
                const dec = await faceapi.detectSingleFace('v').withFaceLandmarks().withFaceDescriptor();
                if(dec) {
                    for (let u of users) {
                        if(faceapi.euclideanDistance(dec.descriptor, new Float32Array(u.face_descriptor)) < 0.45) {
                            myName = u.name; localStorage.setItem('s_name', myName);
                            clearInterval(loop); stream.getTracks().forEach(t => t.stop());
                            document.getElementById('auth').style.display = 'none';
                            document.getElementById('chat-ui').style.display = 'flex';
                            initChat();
                        }
                    }
                }
            }, 700);
        }

        function initChat() {
            load();
            sb.channel('m').on('postgres_changes', {event:'*', schema:'public', table:'messages'}, load).subscribe();
        }

        async function load() {
            const { data } = await sb.from('messages').select('*').order('created_at', { ascending: true });
            const box = document.getElementById('msgs'); box.innerHTML = '';
            data?.forEach(m => {
                const d = document.createElement('div'); d.className = 'msg';
                let h = `<b>${m.sender_name}</b>`;
                if(m.media_url) {
                    if(m.media_url.includes('.webm')) h += `<div class="v-box"><button class="p-btn" onclick="playVoice('${m.media_url}')">▶</button><span>Voice</span></div>`;
                    else if(m.media_url.includes('.mp4')) h += `<video src="${m.media_url}" controls width="100%"></video>`;
                    else h += `<img src="${m.media_url}" width="100%">`;
                }
                if(m.content) h += `<div>${m.content}</div>`;
                d.innerHTML = h;
                d.onclick = (e) => { if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'VIDEO' && confirm("Удалить?")) sb.from('messages').delete().eq('id', m.id); };
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        }

        async function handleMic() {
            const btn = document.getElementById('mic');
            if(!isRec) {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                rec = new MediaRecorder(s); chunks = [];
                rec.ondataavailable = e => chunks.push(e.data);
                rec.onstop = () => {
                    pendingFile = new File([new Blob(chunks, { type: 'audio/webm' })], "voice.webm");
                    document.getElementById('preview').style.display = 'flex';
                    document.getElementById('prev-content').innerText = "🎤 Голосовое записано";
                };
                rec.start(); isRec = true; btn.classList.add('rec-active');
            } else { rec.stop(); isRec = false; btn.classList.remove('rec-active'); }
        }

        async function send() {
            const i = document.getElementById('text'); const txt = i.value.trim();
            if(!txt && !pendingFile) return;
            const f = pendingFile; cancelFile(); i.value = '';
            let url = null;
            if(f) {
                const path = Date.now() + "_sn";
                await sb.storage.from('uploads').upload(path, f);
                url = sb.storage.from('uploads').getPublicUrl(path).data.publicUrl;
            }
            await sb.from('messages').insert([{ sender_name: myName, content: txt, media_url: url }]);
        }

        async function register() {
            const n = prompt("Имя:");
            const d = await faceapi.detectSingleFace('v').withFaceLandmarks().withFaceDescriptor();
            if(d && n) await sb.from('allowed_faces').insert([{ name: n, face_descriptor: Array.from(d.descriptor) }]);
        }
    </script>
</body>
</html>
